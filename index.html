  {key:"sleep",label:"Sleep Quality",desc:"How well are you sleeping? (1=terrible, 5=excellent)",icon:"clock"},

// ── QUESTIONNAIRE-TO-LAB CROSS-REFERENCE RULES ──
const QS_RULES=[
  {check:(a,v)=>a.energy<=2&&v["Vitamin D"]&&v["Vitamin D"].filter(x=>x!=null).slice(-1)[0]<30,sev:"warning",rec:"Patient reports low energy AND Vitamin D is insufficient. Strongly recommend Vitamin D supplementation (5,000-10,000 IU/day) and retest in 8-12 weeks. Low Vitamin D directly impacts energy, mood, and immune function."},
  {check:(a,v)=>a.energy<=2&&v["Free Testosterone"]&&v["Free Testosterone"].filter(x=>x!=null).slice(-1)[0]<15,sev:"warning",rec:"Patient reports low energy AND Free Testosterone is low-normal. Consider testosterone protocol optimization. Low free T is a primary driver of fatigue in HRT patients."},
  {check:(a,v)=>a.energy<=2&&v["TSH"]&&v["TSH"].filter(x=>x!=null).slice(-1)[0]>3.0,sev:"warning",rec:"Patient reports low energy AND TSH trending high. Suboptimal thyroid function may be contributing. Check Free T3/T4 and consider thyroid support."},
  {check:(a,v)=>a.sleep<=2&&v["Cortisol AM"]&&v["Cortisol AM"].filter(x=>x!=null).slice(-1)[0]>18,sev:"info",rec:"Patient reports poor sleep AND morning cortisol is elevated. HPA axis dysregulation likely impacting sleep quality. Consider ashwagandha, magnesium glycinate, or phosphatidylserine."},
  {check:(a,v)=>a.sleep<=2&&v["Estradiol"]&&v["Estradiol"].filter(x=>x!=null).slice(-1)[0]>40,sev:"info",rec:"Patient reports poor sleep AND estradiol is elevated. High estradiol can disrupt sleep architecture. Review AI protocol."},
  {check:(a,v)=>a.libido<=2&&v["Free Testosterone"]&&v["Free Testosterone"].filter(x=>x!=null).slice(-1)[0]<15,sev:"warning",rec:"Patient reports low libido AND Free Testosterone is low-normal. This is likely the primary driver. Optimize free T through dose adjustment or SHBG management."},
  {check:(a,v)=>a.libido<=2&&v["Estradiol"]&&v["Estradiol"].filter(x=>x!=null).slice(-1)[0]>42,sev:"info",rec:"Patient reports low libido AND estradiol is elevated. Excess estradiol can blunt libido even with adequate testosterone."},
  {check:(a,v)=>a.brain_fog>=4&&v["Glucose"]&&v["Glucose"].filter(x=>x!=null).slice(-1)[0]<70,sev:"info",rec:"Patient reports significant brain fog AND glucose is low. Possible reactive hypoglycemia. Assess diet timing and insulin response."},
  {check:(a,v)=>a.brain_fog>=4&&v["Vitamin D"]&&v["Vitamin D"].filter(x=>x!=null).slice(-1)[0]<25,sev:"info",rec:"Patient reports brain fog AND Vitamin D is very low. Vitamin D insufficiency is associated with cognitive impairment. Priority supplementation recommended."},
  {check:(a,v)=>a.hydration<=2&&v["Hematocrit"]&&v["Hematocrit"].filter(x=>x!=null).slice(-1)[0]>51,sev:"warning",rec:"Patient reports poor hydration AND hematocrit is elevated. Dehydration directly increases hematocrit readings. Mandate 100+ oz water daily and retest. This MUST be addressed before further hematocrit interventions."},
  {check:(a,v)=>a.stress>=4&&v["Cortisol AM"]&&v["Cortisol AM"].filter(x=>x!=null).slice(-1)[0]>18,sev:"info",rec:"Patient reports high stress AND cortisol is elevated. Chronic stress response will impair recovery, sleep, and hormonal balance. Address stress management protocols."},
  {check:(a,v)=>a.joint_pain>=3&&v["CRP"]&&v["CRP"].filter(x=>x!=null).slice(-1)[0]>3,sev:"info",rec:"Patient reports joint pain AND CRP is elevated. Systemic inflammation present. Consider anti-inflammatory protocol: omega-3, curcumin, dietary modifications."},
  {check:(a,v)=>a.joint_pain>=3&&v["Estradiol"]&&v["Estradiol"].filter(x=>x!=null).slice(-1)[0]<15,sev:"info",rec:"Patient reports joint pain AND estradiol is low. Estradiol is joint-protective. Low estradiol on HRT can cause joint stiffness and pain. Review AI dosing."},

  {check:(a,v)=>a.digestion<=2&&v["ALT"]&&v["ALT"].filter(x=>x!=null).slice(-1)[0]>40,sev:"info",rec:"Patient reports poor digestion AND ALT is elevated. Liver stress may be contributing to digestive issues. Audit supplements, consider digestive enzymes, evaluate gut health."},

// ── LAB-ONLY RECOMMENDATION RULES ──
const RULES=[
  {m:"Hematocrit",fn:v=>{const r=v.filter(x=>x!=null).slice(-2);return r.length>=2&&r.every(x=>x>51);},s:"critical",c:"CBC",t:"Hematocrit elevated on consecutive draws. Discuss therapeutic phlebotomy schedule. Persistently elevated hematocrit above 54% increases blood viscosity and thrombotic risk. Evaluate testosterone dose as contributing factor."},
  {m:"Hemoglobin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>17.7;},s:"warning",c:"CBC",t:"Hemoglobin above reference. Correlates with hematocrit. Monitor trending."},
  {m:"MCV",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>97;},s:"warning",c:"CBC",t:"MCV elevated (macrocytosis). Check B12/folate, alcohol, medication effects."},
  {m:"Eosinophils %",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>5;},s:"info",c:"CBC",t:"Eosinophils trending up. May indicate allergic response, parasitic exposure, or medication reaction."},
  {m:"ALT",fn:v=>{const s=v.filter(x=>x!=null);if(s.length<2)return false;return s[s.length-1]>s[s.length-2]&&s[s.length-1]>50;},s:"critical",c:"MET",t:"ALT trending upward and above reference. Isolated ALT elevation with stable AST suggests hepatic steatosis or supplement/medication burden. Recommend abdominal ultrasound. Audit all liver-metabolized supplements."},
  {m:"LDL",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>=160;},s:"critical",c:"LIP",t:"LDL in high-risk category (160+). Discuss dietary intervention. Consider ApoB and Lp(a) testing. Evaluate lipid-lowering therapy."},
  {m:"HDL",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<40;},s:"warning",c:"LIP",t:"HDL below protective threshold. Recommend omega-3, increased aerobic exercise, niacin discussion."},
  {m:"Triglycerides",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>150;},s:"warning",c:"LIP",t:"Triglycerides elevated. Verify fasting. Reduce refined carbs and alcohol. Consider omega-3."},
  {m:"Free Testosterone",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<10;},s:"warning",c:"HOR",t:"Free testosterone below optimal. High SHBG may be binding available T. Evaluate protocol."},
  {m:"Estradiol",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>42.6;},s:"warning",c:"HOR",t:"Estradiol elevated. Assess body comp. Consider AI adjustment if symptomatic."},
  {m:"Ferritin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>400;},s:"critical",c:"IRN",t:"Ferritin above reference. Iron overload risk. Therapeutic phlebotomy recommended."},
  {m:"Vitamin D",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<30;},s:"warning",c:"VIT",t:"Vitamin D insufficient (<30). Supplement 5,000-10,000 IU daily. Recheck 8-12 weeks."},
  {m:"IGF-1",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>290;},s:"info",c:"HOR",t:"IGF-1 above range. If using GH/peptides, dose may be high. Monitor."},
  {m:"Prolactin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>20;},s:"info",c:"HOR",t:"Prolactin upper range. Monitor for symptoms. If trending up, consider pituitary MRI."},
  {m:"TSH",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>4.5;},s:"warning",c:"THY",t:"TSH elevated. Check Free T3/T4. Assess: fatigue, weight gain, cold intolerance."},
  {m:"HbA1c",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>5.6;},s:"warning",c:"MET",t:"HbA1c above optimal. Dietary intervention and insulin assessment recommended."},
  {m:"PSA",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>4.0;},s:"critical",c:"HOR",t:"PSA above reference. Urological evaluation required."},

// ── HELPER FUNCTIONS ──
const st=(v,m)=>{const d=MD[m];if(!d||v==null)return"none";if(v<d.lo)return"low";if(v>d.hi)return"high";return"ok";};
const tr=(vals)=>{const v=vals.filter(x=>x!=null);if(v.length<2)return"flat";const p=((v[v.length-1]-v[v.length-2])/Math.abs(v[v.length-2]||1))*100;return p>5?"up":p<-5?"dn":"flat";};

function runLabRecs(data){
  const out=[];
  for(const r of RULES){const mv=data.values[r.m];if(!mv)continue;try{if(r.fn(mv))out.push({marker:r.m,sev:r.s,cat:r.c,rec:r.t});}catch(e){}}
  const o={critical:0,warning:1,info:2};out.sort((a,b)=>o[a.sev]-o[b.sev]);return out;
}

function runQSRecs(questionnaire,values){
  if(!questionnaire||!questionnaire.length)return[];
  const latest=questionnaire[questionnaire.length-1].answers;

async function extractPDF(b64,existingDates){
  const ctx=existingDates.length?"\nPatient has draws: "+existingDates.join(", ")+". Extract ALL draws.":"";
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,
      messages:[{role:"user",content:[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
        {type:"text",text:"Extract ALL lab values from this PDF into JSON."+ctx+"\n\nMatch to: "+Object.keys(MD).join(", ")+"\n\nAliases: SGPT=ALT, SGOT=AST, GFR=eGFR, 25-Hydroxy Vitamin D=Vitamin D, Hemoglobin A1c=HbA1c, Sex Hormone Binding Globulin=SHBG, Dehydroepiandrosterone Sulfate=DHEA-S\n\nFormat dates as Mon YYYY. Respond ONLY with JSON, no markdown:\n{\"draws\":[{\"date\":\"Mar 2026\",\"lab\":\"Labcorp\",\"fasting\":true,\"markers\":{\"Hematocrit\":56.1}}],\"patient_name\":null,\"patient_dob\":null}"}

// ── PATIENT TIMELINE COMPONENT (#4) ──
function Timeline({timeline,draws,values}){
  // Auto-generate timeline from data if no manual entries
  const entries=useMemo(()=>{
    if(timeline&&timeline.length)return timeline;
    // Auto-generate from draws
    return draws.map((draw,i)=>{
      const flags=[];const wins=[];
      for(const[m,v]of Object.entries(values)){
        if(v[i]==null)continue;
        const d=MD[m];if(!d)continue;
        const s=st(v[i],m);
        if(s==="high")flags.push(m+" "+v[i]+" "+d.u+" (HIGH)");
        if(s==="low")flags.push(m+" "+v[i]+" "+d.u+" (LOW)");
        if(i>0){
          const prev=v.slice(0,i).reverse().find(x=>x!=null);
          if(prev!=null){
            const ps=st(prev,m);
            if(ps!=="ok"&&s==="ok")wins.push(m+" normalized: "+prev+" -> "+v[i]);
          }
        }
      }
      let notes=draw.date+" draw ("+draw.lab+(draw.fasting?", fasting":", NON-FASTING")+"). ";
      if(flags.length)notes+="Flags: "+flags.join("; ")+". ";
      if(wins.length)notes+="Wins: "+wins.join("; ")+". ";
      if(!flags.length&&!wins.length)notes+="All tested markers within reference.";
      return{date:draw.date,notes};
    });
  },[timeline,draws,values]);

    entries.map((e,i)=>React.createElement('div',{key:i,style:{display:"flex",gap:16,marginBottom:0}},

            React.createElement('span',{style:{color:"var(--t6)"}},"Patient: "),
            React.createElement('span',{style:{color:"var(--t2)",fontWeight:600}},data.patient.name||"Unknown"),
            " | ",data.draws.length," draws"

          has&&React.createElement('button',{onClick:clear,style:{background:"var(--border)",border:"1px solid var(--border2)",borderRadius:9,padding:"8px 14px",color:"var(--t6)",cursor:"pointer",fontSize:12,fontFamily:"var(--font)"}},"New Patient"),

        ].map((c,i)=>React.createElement('div',{key:i,style:{background:"var(--card)",borderRadius:14,padding:"18px 22px",border:"1px solid var(--border)"}},

          React.createElement('div',{className:"stat-num",style:{fontSize:34,fontWeight:800,color:c.cl,fontFamily:"var(--mono)",marginTop:5}},c.v),

      // TAB NAV

        React.createElement(PDFUp,{onDone:handlePDF,existing:data.draws.map(d=>d.date)}),
        !has&&React.createElement('div',{style:{textAlign:"center",marginTop:20}},
          React.createElement('button',{onClick:loadDemo,style:{background:"transparent",border:"1px solid var(--purple)"+"40",borderRadius:10,padding:"11px 24px",color:"var(--purple)",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"var(--font)"}},"View Demo with Sample Data")

        has&&React.createElement('div',{style:{textAlign:"center",marginTop:18}},
          React.createElement('button',{onClick:()=>setTab("dashboard"),style:{background:"linear-gradient(135deg,var(--purple),#6d4ec4)",border:"none",borderRadius:10,padding:"13px 36px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"var(--font)"}},"Back to Dashboard"))

      // ── DASHBOARD TAB ──
      has&&tab==="dashboard"&&React.createElement('div',{className:"fade-in"},

        ),
        Object.entries(fc).map(([ct,markers])=>{if(!markers?.length)return null;const cfg=CC[ct];return React.createElement('div',{key:ct,style:{marginBottom:30}},
          React.createElement('div',{style:{display:"flex",alignItems:"center",gap:9,marginBottom:14,paddingBottom:10,borderBottom:"1px solid "+cfg?.color+"18"}},

      has&&tab==="recommendations"&&React.createElement('div',{className:"fade-in"},
        React.createElement('div',{style:{marginBottom:18,color:"var(--t5)",fontSize:13}},
          "Auto-generated recommendations from lab values",qsRecs.length>0?" and patient questionnaire":"",".",
          crit>0&&React.createElement('span',{style:{color:"var(--red)",fontWeight:600}}," "+crit+" critical items require immediate attention.")
        ),
        labRecs.length>0&&React.createElement('div',{style:{marginBottom:24}},
          React.createElement('h4',{style:{color:"var(--t2)",fontSize:14,fontWeight:700,marginBottom:12,fontFamily:"var(--head)"}},"Lab-Based Findings"),
          labRecs.map((r,i)=>React.createElement('div',{key:i,style:{background:"var(--card)",border:"1px solid "+SC[r.sev]+"25",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}},
            React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
              React.createElement('span',{style:{display:"inline-block",padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",background:SC[r.sev]+"14",color:SC[r.sev]}},r.sev==="critical"?"ACTION REQUIRED":r.sev==="warning"?"MONITOR":"NOTE"),
              React.createElement('span',{style:{color:"var(--t2)",fontWeight:600,fontSize:14}},r.marker),
              React.createElement('span',{style:{color:"var(--t7)",fontSize:11,marginLeft:"auto"}},CC[r.cat]?.label||"")
            ),
            React.createElement('div',{style:{color:"var(--t4)",fontSize:13,lineHeight:1.7}},r.rec)
          ))
        ),
        qsRecs.length>0&&React.createElement('div',null,
          React.createElement('h4',{style:{color:"var(--amber)",fontSize:14,fontWeight:700,marginBottom:12,fontFamily:"var(--head)"}},"Questionnaire Cross-Reference Findings"),
          qsRecs.map((r,i)=>React.createElement('div',{key:"q"+i,style:{background:"var(--card)",border:"1px solid "+SC[r.sev]+"25",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}},
            React.createElement('span',{style:{display:"inline-block",padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",background:SC[r.sev]+"14",color:SC[r.sev],marginBottom:8}},r.sev==="critical"?"ACTION REQUIRED":r.sev==="warning"?"MONITOR":"NOTE"),
            React.createElement('div',{style:{color:"var(--t4)",fontSize:13,lineHeight:1.7}},r.rec)
          ))
        ),
        allRecs.length===0&&React.createElement('div',{style:{padding:32,textAlign:"center",color:"var(--t6)"}},
          React.createElement('div',{style:{fontSize:36,marginBottom:8,color:"var(--green)"}},"✓"),
          "All markers within reference. No action items."

      // ── QUESTIONNAIRE TAB (#3) ──
      has&&tab==="questionnaire"&&React.createElement('div',null,

        React.createElement(Questionnaire,{questionnaire:data.questionnaire,values:data.values,onSave:handleQSSave})
      ),

      // ── TIMELINE TAB (#4) ──
      has&&tab==="timeline"&&React.createElement('div',null,
        React.createElement('div',{style:{marginBottom:18,color:"var(--t5)",fontSize:13}},"Chronological patient history. Each draw summarized with key flags, wins, and clinical notes."),
        React.createElement(Timeline,{timeline:data.timeline,draws:data.draws,values:data.values})
      ),

      // ── SUMMARY REPORT TAB ──
      has&&tab==="summary"&&React.createElement('div',{className:"fade-in summary-box",style:{background:"var(--card)",borderRadius:14,padding:30,border:"1px solid var(--border)"}},
        React.createElement('h2',{style:{margin:"0 0 5px",color:"var(--t1)",fontSize:21,fontWeight:800,fontFamily:"var(--head)"}},"Lab Review Summary"),
        React.createElement('div',{style:{color:"var(--t6)",fontSize:13,marginBottom:26}},"Patient: "+(data.patient.name||"Unknown")+" | DOB: "+(data.patient.dob||"N/A")+" | "+data.draws.length+" draws ("+data.draws[0]?.date+" through "+data.draws[data.draws.length-1]?.date+")"),

        // Wins
        React.createElement('div',{style:{marginBottom:28}},
          React.createElement('h3',{style:{color:"var(--green)",fontSize:15,fontWeight:700,margin:"0 0 14px",fontFamily:"var(--head)"}},"✓ What's Working"),
          React.createElement('div',{style:{color:"var(--t4)",fontSize:13,lineHeight:1.9}},
            Object.entries(data.values).map(([m,v])=>{
              const vl=v.filter(x=>x!=null);if(vl.length<2)return null;const d=MD[m];if(!d)return null;
              const first=vl[0],last=vl[vl.length-1];
              if((st(first,m)!=="ok"&&st(last,m)==="ok")||(st(first,m)==="high"&&last<first&&d.hi<999)){
                const pct=((last-first)/Math.abs(first)*100).toFixed(0);

          React.createElement('h3',{style:{color:"var(--red)",fontSize:15,fontWeight:700,margin:"0 0 14px",fontFamily:"var(--head)"}},"⚠ Action Items for Provider"),
          allRecs.length>0?React.createElement('div',{style:{color:"var(--t4)",fontSize:13,lineHeight:1.9}},
            allRecs.map((r,i)=>React.createElement('div',{key:i,style:{marginBottom:10,paddingLeft:18,borderLeft:"3px solid "+SC[r.sev]}},
              React.createElement('strong',{style:{color:SC[r.sev]}},i+1,". ",r.marker||"Questionnaire"),": ",r.rec
            ))
          ):React.createElement('div',{style:{color:"var(--green)"}},"All clear.")
        ),

        // Missing markers
        React.createElement('div',{style:{marginBottom:24}},
          React.createElement('h3',{style:{color:"var(--amber)",fontSize:15,fontWeight:700,margin:"0 0 14px",fontFamily:"var(--head)"}},"Consider Re-Adding to Next Panel"),
          React.createElement('div',{style:{color:"var(--t4)",fontSize:13,lineHeight:1.9}},
            Object.entries(data.values).map(([m,v])=>{
              if(v.length<2)return null;const last2=v.slice(-2);
              if(last2.every(x=>x==null)&&v.some(x=>x!=null)){
                const li=v.length-1-[...v].reverse().findIndex(x=>x!=null);
                return React.createElement('div',{key:m},"• ",React.createElement('strong',null,m)," (last tested: ",data.draws[li]?.date,")");
              }return null;
            }).filter(Boolean)
          )
        ),

        // Fasting note
        data.draws.length>0&&!data.draws[data.draws.length-1].fasting&&React.createElement('div',{style:{marginBottom:24,padding:"12px 18px",background:"var(--amber)"+"0e",borderRadius:10,border:"1px solid var(--amber)"+"25",color:"var(--amber)",fontSize:13}},
          React.createElement('strong',null,"Note:")," Most recent draw (",data.draws[data.draws.length-1].date,") was non-fasting. Next lipid panel should be drawn fasting."
        ),

        React.createElement('div',{style:{marginTop:24,padding:"14px 18px",background:"var(--bg)",borderRadius:10,color:"var(--t7)",fontSize:11,lineHeight:1.7}},

}
