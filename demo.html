// ── SIMPLE SVG CHART (no external deps) ──
function SVGChart({marker,values,draws,def}){
  const pts=draws.map((dr,i)=>({date:dr.date,value:values[i]})).filter(x=>x.value!=null);
  if(!pts.length)return <div style={{color:"var(--t6)",fontSize:13,padding:16}}>No data</div>;
  const vals=pts.map(x=>x.value);
  const mn=Math.min(...vals,def.lo)*0.88;const mx=Math.max(...vals,def.hi)*1.12;
  const range=mx-mn||1;
  const W=600,H=200,PL=45,PR=15,PT=15,PB=30;
  const cw=W-PL-PR,ch=H-PT-PB;
  const clr=CC[def.c]?.color||"#9370e0";
  const toX=(i)=>PL+(i/(pts.length-1||1))*cw;
  const toY=(v)=>PT+ch-(((v-mn)/range)*ch);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(p.value).toFixed(1)}`).join(' ');
  const area=line+` L${toX(pts.length-1).toFixed(1)},${(PT+ch).toFixed(1)} L${toX(0).toFixed(1)},${(PT+ch).toFixed(1)} Z`;
  const hiY=def.hi<999?toY(def.hi):null;
  const loY=def.lo>0?toY(def.lo):null;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",maxHeight:210}}>
      <defs><linearGradient id={"gr_"+marker.replace(/[\s%]/g,'')} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={clr} stopOpacity="0.2"/><stop offset="100%" stopColor={clr} stopOpacity="0.02"/></linearGradient></defs>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(f=><line key={f} x1={PL} y1={PT+ch*f} x2={W-PR} y2={PT+ch*f} stroke="#1a2233" strokeWidth="1"/>)}
      {/* Ref lines */}
      {hiY!=null&&hiY>=PT&&hiY<=PT+ch&&<line x1={PL} y1={hiY} x2={W-PR} y2={hiY} stroke="#e0525240" strokeWidth="1" strokeDasharray="6 4"/>}
      {loY!=null&&loY>=PT&&loY<=PT+ch&&<line x1={PL} y1={loY} x2={W-PR} y2={loY} stroke="#d4973b40" strokeWidth="1" strokeDasharray="6 4"/>}
      {/* Area fill */}
      <path d={area} fill={`url(#gr_${marker.replace(/[\s%]/g,'')})`}/>
      {/* Line */}
      <path d={line} fill="none" stroke={clr} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {/* Dots and labels */}
      {pts.map((p,i)=><g key={i}>
        <circle cx={toX(i)} cy={toY(p.value)} r="5" fill="var(--bg)" stroke={clr} strokeWidth="2.5"/>
        <text x={toX(i)} y={toY(p.value)-10} textAnchor="middle" fill={clr} fontSize="10" fontWeight="600" fontFamily="var(--mono)">{p.value}</text>
        <text x={toX(i)} y={H-5} textAnchor="middle" fill="var(--t5)" fontSize="9" fontFamily="var(--font)">{p.date}</text>
      </g>)}
      {/* Y axis labels */}
      <text x={PL-5} y={PT+5} textAnchor="end" fill="var(--t6)" fontSize="9" fontFamily="var(--mono)">{mx.toFixed(0)}</text>
      <text x={PL-5} y={PT+ch} textAnchor="end" fill="var(--t6)" fontSize="9" fontFamily="var(--mono)">{mn.toFixed(0)}</text>
      {hiY!=null&&hiY>=PT&&hiY<=PT+ch&&<text x={W-PR+3} y={hiY+3} fill="#e05252" fontSize="8" fontFamily="var(--mono)">H:{def.hi}</text>}
      {loY!=null&&loY>=PT&&loY<=PT+ch&&<text x={W-PR+3} y={loY+3} fill="#d4973b" fontSize="8" fontFamily="var(--mono)">L:{def.lo}</text>}
    </svg>
  );
}

  {m:"Ferritin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>400;},s:"critical",t:"Ferritin above reference. Therapeutic phlebotomy."},
  {m:"Vitamin D",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<30;},s:"warning",t:"Vitamin D insufficient. Supplement 5-10K IU daily."},
  {m:"Free Testosterone",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<10;},s:"warning",t:"Free T below optimal. Evaluate SHBG and protocol."},
  {m:"Estradiol",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>42.6;},s:"warning",t:"Estradiol elevated. Consider AI adjustment."},
  {m:"IGF-1",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>290;},s:"info",t:"IGF-1 above range. Monitor GH/peptide dose."},
  {m:"Prolactin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>20;},s:"info",t:"Prolactin upper range. If trending up, pituitary MRI."},
];

// ── HELPERS ──
const st=(v,m)=>{const d=MD[m];if(!d||v==null)return"none";if(v<d.lo)return"low";if(v>d.hi)return"high";return"ok";};
const tr=(vals)=>{const v=vals.filter(x=>x!=null);if(v.length<2)return"flat";const p=((v[v.length-1]-v[v.length-2])/Math.abs(v[v.length-2]||1))*100;return p>5?"up":p<-5?"dn":"flat";};
function runLR(d){const o=[];for(const r of RULES){const mv=d.values[r.m];if(!mv)continue;try{if(r.fn(mv))o.push({marker:r.m,sev:r.s,rec:r.t});}catch(e){}}o.sort((a,b)=>({critical:0,warning:1,info:2}[a.sev])-({critical:0,warning:1,info:2}[b.sev]));return o;}
function runQR(qs,vals){if(!qs?.length)return[];const a=qs[qs.length-1].answers;const o=[];for(const r of QS_RULES){try{if(r.check(a,vals))o.push({sev:r.sev,rec:r.rec});}catch(e){}}return o;}

// ── MARKER CARD ──
function MCard({marker,values,draws,open,toggle}){
  const d=MD[marker];if(!d)return null;
  const vv=values.filter(v=>v!=null);if(!vv.length)return null;
  const last=vv[vv.length-1];const li=values.length-1-[...values].reverse().findIndex(v=>v!=null);
  const s=st(last,marker);const t=tr(values);const col=s==="ok"?"var(--green)":s==="high"?"var(--red)":"var(--amber)";
  return(<div style={{background:"var(--card)",border:"1px solid "+(s==="high"||s==="low"?(s==="high"?SC.critical:SC.warning)+"30":"var(--border)"),borderRadius:14,overflow:"hidden"}}>
    <div onClick={toggle} style={{padding:"15px 20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
        <span style={{display:"inline-block",width:9,height:9,borderRadius:"50%",background:col}}/>
        <span style={{color:"var(--t2)",fontWeight:600,fontSize:14}}>{marker}</span>
        <span style={{color:"var(--t7)",fontSize:11,fontFamily:"var(--mono)"}}>{d.u}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{textAlign:"right"}}>
          <span style={{color:col,fontWeight:700,fontSize:20,fontFamily:"var(--mono)"}}>{last}</span>
          <span style={{color:"var(--t6)",fontSize:10.5,display:"block"}}>{draws[li]?.date}</span>
        </div>
        {t==="up"&&<span style={{color:"var(--red)"}}>&#9650;</span>}
        {t==="dn"&&<span style={{color:"var(--green)"}}>&#9660;</span>}
        <span style={{color:"var(--t6)"}}>{open?"&#9652;":"&#9662;"}</span>
      </div>
    </div>
    {open&&<div style={{padding:"0 20px 20px"}}>
      <SVGChart marker={marker} values={values} draws={draws} def={d}/>
      <div style={{marginTop:14,display:"flex",flexWrap:"wrap",gap:7}}>
        {draws.map((dr,i)=>values[i]!=null&&<div key={i} style={{background:"var(--bg)",borderRadius:7,padding:"5px 10px",fontSize:11,color:"var(--t5)",border:"1px solid var(--border)"}}>
          <span style={{color:"var(--t2)",fontWeight:600}}>{dr.date}</span>{" | "}
          <span style={{color:st(values[i],marker)==="ok"?"var(--green)":st(values[i],marker)==="high"?"var(--red)":"var(--amber)",fontFamily:"var(--mono)",fontWeight:600}}>{values[i]}</span>{" | "}{dr.lab}
        </div>)}
      </div>
    </div>}
  </div>);
}

// ── QUESTIONNAIRE ──
function QS({questionnaire,values,onSave}){
  const[a,sA]=useState({sleep:3,energy:3,libido:3,mood:3,hydration:3,brain_fog:1,joint_pain:1,digestion:3,stress:2,exercise:3});
  const[saved,sS]=useState(false);
  const qr=useMemo(()=>runQR([{answers:a}],values),[a,values]);

  const neg=k=>k==="brain_fog"||k==="joint_pain"||k==="stress";
  return(<div>
    <div className="qs-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>

    <button onClick={()=>{onSave(a);sS(true);setTimeout(()=>sS(false),2000);}} style={{background:saved?"var(--green)":"linear-gradient(135deg,var(--green),#2a9d54)",border:"none",borderRadius:10,padding:"13px 28px",color:"var(--bg)",fontWeight:700,fontSize:14,cursor:"pointer"}}>{saved?"Saved!":"Save Questionnaire"}</button>
  </div>);
}

// ── TREATMENT PLAN ENGINE ──

function generatePlan(data,labRecs,qsRecs){
  const glv=(marker)=>{const v=data.values[marker];if(!v)return null;const vl=v.filter(x=>x!=null);return vl.length?vl[vl.length-1]:null;};
  const plan=[];const seen=new Set();
  const TX=[
    {markers:["Hematocrit"],check:()=>st(glv("Hematocrit"),"Hematocrit")==="high",cat:"Procedure",action:"Therapeutic Phlebotomy",detail:"Schedule phlebotomy to reduce hematocrit below 50%. Repeat every 4-8 weeks until normalized.",freq:"Every 4-8 weeks",followup:"Recheck CBC in 4 weeks post-phlebotomy",priority:"high"},
    {markers:["Hematocrit"],check:()=>glv("Hematocrit")>51,cat:"Lifestyle",action:"Increase Hydration",detail:"Minimum 100 oz water daily. Dehydration artificially elevates hematocrit readings.",freq:"Daily",followup:"Assess at next visit",priority:"high"},
    {markers:["ALT"],check:()=>glv("ALT")>50,cat:"Diagnostic",action:"Abdominal Ultrasound",detail:"Evaluate for hepatic steatosis. ALT trending upward with stable AST suggests liver stress.",freq:"One-time",followup:"Review results, reassess supplement load",priority:"high"},
    {markers:["ALT"],check:()=>glv("ALT")>40,cat:"Supplement",action:"Liver Support Protocol",detail:"NAC 600mg 2x/day, Milk Thistle 250mg/day. Audit and reduce hepatotoxic supplements.",freq:"Daily",followup:"Recheck ALT in 8 weeks",priority:"med"},
    {markers:["LDL"],check:()=>glv("LDL")>=160,cat:"Diagnostic",action:"Advanced Lipid Testing",detail:"Order ApoB and Lp(a) for refined cardiovascular risk assessment.",freq:"One-time",followup:"Review for statin consideration",priority:"high"},
    {markers:["LDL"],check:()=>glv("LDL")>=130,cat:"Lifestyle",action:"Dietary Lipid Intervention",detail:"Reduce saturated fat. Increase soluble fiber (oats, beans, flaxseed). Consider plant sterols.",freq:"Daily",followup:"Recheck fasting lipids in 12 weeks",priority:"med"},
    {markers:["HDL"],check:()=>glv("HDL")!=null&&glv("HDL")<40,cat:"Supplement",action:"Omega-3 Fatty Acids",detail:"EPA/DHA 2-4g daily (pharmaceutical grade).",freq:"Daily",followup:"Recheck lipids in 12 weeks",priority:"med"},
    {markers:["HDL"],check:()=>glv("HDL")!=null&&glv("HDL")<40,cat:"Lifestyle",action:"Aerobic Exercise Protocol",detail:"Minimum 150 minutes/week moderate-intensity cardio. Zone 2 training. Most effective HDL intervention.",freq:"5x/week",followup:"Assess compliance next visit",priority:"med"},
    {markers:["Vitamin D"],check:()=>glv("Vitamin D")!=null&&glv("Vitamin D")<30,cat:"Supplement",action:"Vitamin D3 Supplementation",detail:"5,000-10,000 IU daily with fat-containing meal. Use D3 (cholecalciferol).",freq:"Daily",followup:"Recheck 25-OH Vitamin D in 8-12 weeks",priority:"med"},
    {markers:["Ferritin"],check:()=>glv("Ferritin")>400,cat:"Procedure",action:"Therapeutic Phlebotomy (Iron)",detail:"Phlebotomy to reduce ferritin below 300. Iron overload causes hepatic stress.",freq:"Every 4-8 weeks",followup:"Recheck ferritin in 4 weeks",priority:"high"},
    {markers:["Free Testosterone"],check:()=>glv("Free Testosterone")!=null&&glv("Free Testosterone")<15,cat:"HRT",action:"Evaluate Testosterone Protocol",detail:"Free T low-normal. Assess SHBG. Consider dose adjustment, frequency change, or delivery switch.",freq:"Protocol review",followup:"Recheck free T and SHBG in 6-8 weeks",priority:"med"},
    {markers:["Estradiol"],check:()=>glv("Estradiol")>42.6,cat:"HRT",action:"Aromatase Inhibitor Adjustment",detail:"If symptomatic, consider anastrozole 0.25-0.5mg 2x/week. Target 20-35 pg/mL.",freq:"2x/week if initiated",followup:"Recheck E2 in 4-6 weeks",priority:"med"},
    {markers:["MCV"],check:()=>glv("MCV")>97,cat:"Diagnostic",action:"Macrocytosis Workup",detail:"Check folate. Review alcohol and medications. If B12 adequate, investigate further.",freq:"One-time",followup:"Review results",priority:"low"},
    {markers:["Eosinophils %"],check:()=>glv("Eosinophils %")>5,cat:"Diagnostic",action:"Allergy Panel",detail:"Eosinophils trending up. Order allergy panel, IgE. Review medications.",freq:"One-time",followup:"Review results",priority:"low"},
    {markers:["IGF-1"],check:()=>glv("IGF-1")>290,cat:"HRT",action:"Review GH/Peptide Dosing",detail:"IGF-1 above range. Consider dose reduction if on GH or secretagogues.",freq:"Protocol review",followup:"Recheck IGF-1 in 8 weeks",priority:"low"},

  return plan;
}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={{color:"var(--t5)",fontSize:11,fontWeight:600,display:"block",marginBottom:4}}>Frequency</label><input value={customFreq} onChange={e=>setCF(e.target.value)} placeholder="e.g. Daily" style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"9px 12px",color:"var(--t2)",fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
        <div><label style={{color:"var(--t5)",fontSize:11,fontWeight:600,display:"block",marginBottom:4}}>Follow-up</label><input value={customFU} onChange={e=>setCU(e.target.value)} placeholder="e.g. Recheck in 8 weeks" style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"9px 12px",color:"var(--t2)",fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
      </div>
      <button onClick={addCustom} style={{background:"var(--green)",border:"none",borderRadius:8,padding:"10px 24px",color:"var(--bg)",fontWeight:700,fontSize:13,cursor:"pointer"}}>Add to Plan</button>
    </div>}

    {/* Active items */}
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {activeItems.map(item=><div key={item.id} style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:"1px solid var(--border)"}}>
          <span style={{padding:"3px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",background:(catColors[item.cat]||"var(--purple)")+"18",color:catColors[item.cat]||"var(--purple)",border:"1px solid "+(catColors[item.cat]||"var(--purple)")+"30"}}>{item.cat}</span>
          <input value={item.action} onChange={e=>updateField(item.id,"action",e.target.value)} style={{flex:1,background:"transparent",border:"none",color:"var(--t1)",fontSize:15,fontWeight:700,outline:"none",fontFamily:"var(--font)"}}/>
          <span style={{width:8,height:8,borderRadius:"50%",background:priColors[item.priority]||"var(--amber)"}} title={item.priority+" priority"}/>
          <span style={{color:"var(--t7)",fontSize:11}}>via {item.source}</span>
          {item.edited&&<span style={{color:"var(--amber)",fontSize:10,fontWeight:600}}>EDITED</span>}
          <button onClick={()=>toggleActive(item.id)} style={{background:"none",border:"none",color:"var(--t6)",cursor:"pointer",fontSize:11,padding:"4px 8px"}}>skip</button>
          <button onClick={()=>removeItem(item.id)} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:14,padding:"4px 8px"}}>x</button>
        </div>
        <div style={{padding:"12px 18px",display:"grid",gridTemplateColumns:"1fr",gap:8}}>
          <div><label style={{color:"var(--t6)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Details / Dosing</label><textarea value={item.detail} onChange={e=>updateField(item.id,"detail",e.target.value)} rows={2} style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",color:"var(--t3)",fontSize:13,outline:"none",resize:"vertical",fontFamily:"var(--font)",boxSizing:"border-box",marginTop:4}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={{color:"var(--t6)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Frequency</label><input value={item.freq} onChange={e=>updateField(item.id,"freq",e.target.value)} style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",color:"var(--t3)",fontSize:13,outline:"none",fontFamily:"var(--font)",boxSizing:"border-box",marginTop:4}}/></div>
            <div><label style={{color:"var(--t6)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Follow-up</label><input value={item.followup} onChange={e=>updateField(item.id,"followup",e.target.value)} style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",color:"var(--t3)",fontSize:13,outline:"none",fontFamily:"var(--font)",boxSizing:"border-box",marginTop:4}}/></div>
          </div>
        </div>
      </div>)}
    </div>

    {/* Skipped items */}
    {inactiveItems.length>0&&<div style={{marginTop:24}}>
      <h4 style={{color:"var(--t6)",fontSize:13,fontWeight:600,marginBottom:10}}>Skipped ({inactiveItems.length})</h4>
      {inactiveItems.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",background:"var(--bg)",borderRadius:9,border:"1px solid var(--border)",marginBottom:6,opacity:0.6}}>
        <span style={{color:"var(--t5)",fontSize:13,flex:1,textDecoration:"line-through"}}>{item.action}</span>
        <span style={{color:"var(--t7)",fontSize:11}}>{item.cat}</span>
        <button onClick={()=>toggleActive(item.id)} style={{background:"var(--border)",border:"none",borderRadius:6,padding:"5px 12px",color:"var(--t4)",cursor:"pointer",fontSize:11}}>restore</button>
      </div>)}
    </div>}

    {/* Plan summary count */}
    <div style={{marginTop:24,padding:"14px 18px",background:"var(--bg)",borderRadius:10,border:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
      <div style={{color:"var(--t5)",fontSize:13}}><strong style={{color:"var(--t2)"}}>{activeItems.length}</strong> active treatment items | <strong style={{color:priColors.high}}>{activeItems.filter(x=>x.priority==="high").length}</strong> high priority</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {Object.entries(catColors).map(([k,c])=>{const n=activeItems.filter(x=>x.cat===k).length;if(!n)return null;return<span key={k} style={{padding:"3px 10px",borderRadius:5,fontSize:10,fontWeight:600,background:c+"14",color:c}}>{k}: {n}</span>;})}
      </div>
    </div>

    {/* Export PDF */}
    <button onClick={()=>{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:"mm",format:"letter"});
      const W=doc.internal.pageSize.getWidth();
      const mg=18;let y=20;
      const addPage=()=>{doc.addPage();y=20;};
      const checkY=(need)=>{if(y+need>260){addPage();}};

      // Header
      doc.setFillColor(8,12,22);doc.rect(0,0,W,38,"F");
      doc.setTextColor(59,186,106);doc.setFontSize(22);doc.setFont("helvetica","bold");
      doc.text("MedLabIQ",mg,16);
      doc.setTextColor(180,186,200);doc.setFontSize(10);doc.setFont("helvetica","normal");
      doc.text("Treatment Plan",mg,23);
      doc.setTextColor(122,134,153);doc.setFontSize(9);
      doc.text("Patient: "+(data.patient.name||"Unknown")+"  |  DOB: "+(data.patient.dob||"N/A")+"  |  Generated: "+new Date().toLocaleDateString(),mg,30);
      y=46;

      // Priority summary
      doc.setTextColor(60,60,60);doc.setFontSize(9);doc.setFont("helvetica","bold");
      const hiP=activeItems.filter(x=>x.priority==="high").length;
      const mdP=activeItems.filter(x=>x.priority==="med").length;
      const loP=activeItems.filter(x=>x.priority==="low").length;
      doc.text(activeItems.length+" Active Items  |  "+hiP+" High Priority  |  "+mdP+" Medium  |  "+loP+" Low",mg,y);
      y+=10;

      // Group by category
      const groups={};for(const item of activeItems){if(!groups[item.cat])groups[item.cat]=[];groups[item.cat].push(item);}

      for(const[cat,items]of Object.entries(groups)){
        checkY(20);
        // Category header
        doc.setFillColor(240,244,248);doc.rect(mg-2,y-4,W-mg*2+4,8,"F");
        doc.setTextColor(40,40,40);doc.setFontSize(11);doc.setFont("helvetica","bold");
        doc.text(cat.toUpperCase(),mg,y+1);
        y+=12;

        for(const item of items){
          checkY(35);
          // Priority indicator
          const pc=item.priority==="high"?[224,82,82]:item.priority==="med"?[212,151,59]:[74,144,217];
          doc.setFillColor(...pc);doc.circle(mg+2,y-1,1.5,"F");

          // Action name
          doc.setTextColor(30,30,30);doc.setFontSize(11);doc.setFont("helvetica","bold");
          doc.text(item.action,mg+7,y);
          if(item.edited){doc.setTextColor(212,151,59);doc.setFontSize(7);doc.text("EDITED",mg+7+doc.getTextWidth(item.action)+3,y);}
          y+=6;

          // Detail
          doc.setTextColor(80,80,80);doc.setFontSize(9);doc.setFont("helvetica","normal");
          const detailLines=doc.splitTextToSize(item.detail||"",W-mg*2-7);
          doc.text(detailLines,mg+7,y);
          y+=detailLines.length*4.5;

          // Freq + followup
          doc.setTextColor(100,110,120);doc.setFontSize(8);
          doc.text("Frequency: "+(item.freq||"--")+"     Follow-up: "+(item.followup||"--"),mg+7,y);
          y+=8;

          // Separator
          doc.setDrawColor(220,220,220);doc.line(mg,y-2,W-mg,y-2);
          y+=4;
        }
        y+=4;
      }

      // Footer
      checkY(20);
      doc.setDrawColor(180,180,180);doc.line(mg,y,W-mg,y);y+=6;
      doc.setTextColor(150,150,150);doc.setFontSize(7);doc.setFont("helvetica","normal");
      doc.text("Auto-generated by MedLabIQ. This treatment plan is a clinical decision support output and does not constitute",mg,y);y+=3.5;
      doc.text("a prescription or medical order. All items must be reviewed and authorized by the treating provider.",mg,y);y+=5;
      doc.text("Provider Signature: ________________________________     Date: ________________",mg,y);

      doc.save("MedLabIQ_Treatment_Plan_"+(data.patient.name||"Patient").replace(/\s/g,"_")+".pdf");
    }} style={{marginTop:16,width:"100%",background:"linear-gradient(135deg,var(--purple),#6d4ec4)",border:"none",borderRadius:10,padding:"14px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      &#128196; Export Treatment Plan as PDF
    </button>
  </div>);
}

// ── ADMIN / PRACTITIONER PORTAL ──
function AdminPortal({onSelectPatient,onBack}){
  const[adminTab,setAT]=useState("roster");
  const[search,setSrc]=useState("");
  const[filterStatus,setFS]=useState("all");
  const[filterProvider,setFP]=useState("all");
  const[sortBy,setSB]=useState("name");

  const totalPatients=CLINIC_PATIENTS.length;
  const activePatients=CLINIC_PATIENTS.filter(p=>p.status==="active").length;
  const totalCritFlags=CLINIC_PATIENTS.reduce((s,p)=>s+p.critFlags,0);
  const labsOverdue=CLINIC_PATIENTS.filter(p=>p.labsDue).length;
  const unsignedPlans=CLINIC_PATIENTS.filter(p=>p.planStatus==="draft"||p.planStatus==="none").length;

  let filtered=CLINIC_PATIENTS.filter(p=>{
    if(filterStatus!=="all"&&p.status!==filterStatus)return false;
    if(filterProvider!=="all"&&p.provider!==filterProvider)return false;
    if(search&&!p.name.toLowerCase().includes(search.toLowerCase())&&!p.id.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  if(sortBy==="name")filtered.sort((a,b)=>a.name.localeCompare(b.name));
  if(sortBy==="flags")filtered.sort((a,b)=>(b.critFlags+b.warnFlags)-(a.critFlags+a.warnFlags));
  if(sortBy==="lastDraw")filtered.sort((a,b)=>a.lastDraw.localeCompare(b.lastDraw));
  if(sortBy==="labsDue")filtered.sort((a,b)=>(b.labsDue?1:0)-(a.labsDue?1:0));

  const atabs=[{k:"roster",l:"Patient Roster"},{k:"overdue",l:"Overdue Labs ("+labsOverdue+")"},{k:"flags",l:"Active Flags ("+totalCritFlags+")"},{k:"providers",l:"Providers"},{k:"audit",l:"Audit Log"}];

  return(<div style={{fontFamily:"var(--font)",background:"var(--bg)",minHeight:"100vh",color:"var(--t3)"}}>
    <div style={{background:"linear-gradient(180deg,#0c1220,var(--card))",borderBottom:"1px solid var(--border)",padding:"18px 24px"}}>
      <div className="hdr-wrap" style={{maxWidth:1400,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}>
        <a href="/" style={{display:"flex",alignItems:"center",gap:12,textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,var(--green),var(--cyan))",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:"var(--bg)",fontFamily:"Manrope"}}>M</div><div><div style={{fontSize:17,fontWeight:800,color:"var(--t1)",fontFamily:"var(--head)"}}>MedLabIQ</div><div style={{fontSize:11,color:"var(--t7)"}}>Clinic Administration</div></div></a>
        <div className="hdr-right" style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{background:"var(--purple)15",border:"1px solid var(--purple)30",borderRadius:8,padding:"6px 14px",fontSize:12,color:"var(--purple)",fontWeight:600}}>ADMIN</div>
          <div style={{background:"var(--card)",borderRadius:9,padding:"8px 14px",border:"1px solid var(--border)",fontSize:13}}><span style={{color:"var(--t6)"}}>Elevate Health </span><span style={{color:"var(--t2)",fontWeight:600}}>{totalPatients} patients</span></div>
          <button onClick={onBack} style={{background:"var(--border)",border:"1px solid var(--border2)",borderRadius:8,padding:"8px 14px",color:"var(--t4)",cursor:"pointer",fontSize:12}}>Patient View</button>
        </div>
      </div>
    </div>

    <div className="page-pad" style={{maxWidth:1400,margin:"0 auto",padding:24}}>
      {/* Clinic Stats */}
      <div className="stat-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:12,marginBottom:26}}>
        {[
          {l:"Active Patients",v:activePatients,c:"var(--green)",s:"of "+totalPatients+" total"},
          {l:"Critical Flags",v:totalCritFlags,c:totalCritFlags>0?"var(--red)":"var(--green)",s:"across all patients"},
          {l:"Labs Overdue",v:labsOverdue,c:labsOverdue>0?"var(--amber)":"var(--green)",s:"patients need draws"},
          {l:"Unsigned Plans",v:unsignedPlans,c:unsignedPlans>0?"var(--amber)":"var(--green)",s:"draft or missing"},
          {l:"Providers",v:CLINIC_PROVIDERS.length,c:"var(--cyan)",s:"active"},
        ].map((x,i)=><div key={i} style={{background:"var(--card)",borderRadius:14,padding:"16px 20px",border:"1px solid var(--border)"}}><div style={{color:"var(--t6)",fontSize:10,textTransform:"uppercase",fontWeight:700,letterSpacing:"0.08em"}}>{x.l}</div><div className="sn" style={{fontSize:30,fontWeight:800,color:x.c,fontFamily:"var(--mono)",marginTop:4}}>{x.v}</div><div style={{fontSize:11,color:"var(--t7)"}}>{x.s}</div></div>)}
      </div>

      {/* Admin Tabs */}
      <div className="tab-nav" style={{display:"flex",gap:3,marginBottom:26,background:"var(--card)",borderRadius:12,padding:4,border:"1px solid var(--border)",flexWrap:"wrap"}}>
        {atabs.map(t=><button key={t.k} onClick={()=>setAT(t.k)} style={{flex:"1 1 auto",padding:"11px 14px",border:"none",borderRadius:9,background:adminTab===t.k?"var(--border)":"transparent",color:adminTab===t.k?"var(--t2)":"var(--t6)",cursor:"pointer",fontSize:12.5,fontWeight:adminTab===t.k?600:400,whiteSpace:"nowrap"}}>{t.l}</button>)}
      </div>

      {/* PATIENT ROSTER */}
      {adminTab==="roster"&&<div>
        <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSrc(e.target.value)} placeholder="Search patients..." style={{flex:1,minWidth:200,background:"var(--card)",border:"1px solid var(--border)",borderRadius:9,padding:"10px 14px",color:"var(--t2)",fontSize:13,outline:"none"}}/>
          <select value={filterStatus} onChange={e=>setFS(e.target.value)} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:9,padding:"10px 14px",color:"var(--t3)",fontSize:13}}>
            <option value="all">All Status</option><option value="active">Active</option><option value="inactive">Inactive</option>
          </select>
          <select value={filterProvider} onChange={e=>setFP(e.target.value)} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:9,padding:"10px 14px",color:"var(--t3)",fontSize:13}}>
            <option value="all">All Providers</option>{CLINIC_PROVIDERS.map(pr=><option key={pr.name} value={pr.name}>{pr.name}</option>)}
          </select>
          <select value={sortBy} onChange={e=>setSB(e.target.value)} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:9,padding:"10px 14px",color:"var(--t3)",fontSize:13}}>
            <option value="name">Sort: Name</option><option value="flags">Sort: Most Flags</option><option value="labsDue">Sort: Labs Due</option>
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {filtered.map(pt=>{
            const hasFlags=pt.critFlags>0||pt.warnFlags>0;
            return(<div key={pt.id} onClick={()=>onSelectPatient(pt)} style={{background:"var(--card)",borderRadius:12,padding:"14px 20px",border:"1px solid "+(pt.critFlags>0?"var(--red)20":pt.labsDue?"var(--amber)20":"var(--border)"),cursor:"pointer",display:"flex",alignItems:"center",gap:16,transition:"all 0.15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--green)"} onMouseLeave={e=>e.currentTarget.style.borderColor=pt.critFlags>0?"#e0525220":pt.labsDue?"#d4973b20":"#182035"}>
              <div style={{width:40,height:40,borderRadius:10,background:pt.status==="active"?"var(--border2)":"var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,color:pt.status==="active"?"var(--t2)":"var(--t6)",flexShrink:0}}>{pt.name.split(" ").map(n=>n[0]).join("")}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"var(--t1)",fontWeight:700,fontSize:14}}>{pt.name}</span>{pt.status==="inactive"&&<span style={{padding:"1px 8px",borderRadius:4,fontSize:9,fontWeight:600,background:"var(--t6)20",color:"var(--t6)"}}>INACTIVE</span>}</div>
                <div style={{color:"var(--t5)",fontSize:12,marginTop:2}}>{pt.id} | {pt.gender} | DOB: {pt.dob} | Provider: {pt.provider}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
                {pt.critFlags>0&&<span style={{padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,background:"var(--red)14",color:"var(--red)"}}>{pt.critFlags} CRIT</span>}
                {pt.warnFlags>0&&<span style={{padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,background:"var(--amber)14",color:"var(--amber)"}}>{pt.warnFlags} WARN</span>}
                {pt.labsDue&&<span style={{padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,background:"var(--purple)14",color:"var(--purple)"}}>LABS DUE</span>}
                <span style={{padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:600,background:pt.planStatus==="signed"?"var(--green)14":pt.planStatus==="draft"?"var(--amber)14":"var(--t6)14",color:pt.planStatus==="signed"?"var(--green)":pt.planStatus==="draft"?"var(--amber)":"var(--t6)"}}>{pt.planStatus==="signed"?"PLAN SIGNED":pt.planStatus==="draft"?"PLAN DRAFT":"NO PLAN"}</span>
                <div style={{color:"var(--t5)",fontSize:11,textAlign:"right",minWidth:70}}><div>{pt.draws} draws</div><div>Last: {pt.lastDraw}</div></div>
              </div>
            </div>);
          })}
        </div>
        <div style={{marginTop:16,color:"var(--t6)",fontSize:12}}>{filtered.length} of {totalPatients} patients shown</div>
      </div>}

      {/* OVERDUE LABS */}
      {adminTab==="overdue"&&<div>
        <div style={{color:"var(--t5)",fontSize:13,marginBottom:18}}>Patients who need follow-up labs. Sorted by urgency.</div>
        {CLINIC_PATIENTS.filter(p=>p.labsDue).sort((a,b)=>a.lastDraw.localeCompare(b.lastDraw)).map(pt=><div key={pt.id} onClick={()=>onSelectPatient(pt)} style={{background:"var(--card)",borderRadius:12,padding:"16px 20px",border:"1px solid var(--amber)20",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
          <div><span style={{color:"var(--t1)",fontWeight:700,fontSize:14}}>{pt.name}</span><span style={{color:"var(--t5)",fontSize:12,marginLeft:10}}>Last draw: {pt.lastDraw}</span></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{color:"var(--t5)",fontSize:12}}>Provider: {pt.provider}</span>
            <button onClick={e=>{e.stopPropagation();}} style={{background:"var(--amber)",border:"none",borderRadius:7,padding:"7px 14px",color:"var(--bg)",fontWeight:700,fontSize:11,cursor:"pointer"}}>Send Reminder</button>
          </div>
        </div>)}
      </div>}

      {/* ACTIVE FLAGS */}
      {adminTab==="flags"&&<div>
        <div style={{color:"var(--t5)",fontSize:13,marginBottom:18}}>All patients with critical or warning flags. Click to open patient dashboard.</div>
        {CLINIC_PATIENTS.filter(p=>p.critFlags>0||p.warnFlags>0).sort((a,b)=>b.critFlags-a.critFlags).map(pt=><div key={pt.id} onClick={()=>onSelectPatient(pt)} style={{background:"var(--card)",borderRadius:12,padding:"16px 20px",border:"1px solid "+(pt.critFlags>0?"var(--red)":"var(--amber)")+"20",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:9,background:"var(--border2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:"var(--t2)"}}>{pt.name.split(" ").map(n=>n[0]).join("")}</div>
            <div><div style={{color:"var(--t1)",fontWeight:700,fontSize:14}}>{pt.name}</div><div style={{color:"var(--t5)",fontSize:12}}>{pt.draws} draws | Last: {pt.lastDraw} | {pt.provider}</div></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {pt.critFlags>0&&<span style={{padding:"4px 12px",borderRadius:6,fontSize:11,fontWeight:700,background:"var(--red)14",color:"var(--red)"}}>{pt.critFlags} Critical</span>}
            {pt.warnFlags>0&&<span style={{padding:"4px 12px",borderRadius:6,fontSize:11,fontWeight:700,background:"var(--amber)14",color:"var(--amber)"}}>{pt.warnFlags} Warning</span>}
          </div>
        </div>)}
      </div>}

      {/* PROVIDERS */}
      {adminTab==="providers"&&<div>
        <div style={{color:"var(--t5)",fontSize:13,marginBottom:18}}>Clinic providers and their patient load.</div>
        {CLINIC_PROVIDERS.map((pr,i)=>{
          const prPatients=CLINIC_PATIENTS.filter(p=>p.provider===pr.name);
          const prCrit=prPatients.reduce((s,p)=>s+p.critFlags,0);
          const prOverdue=prPatients.filter(p=>p.labsDue).length;
          return(<div key={i} style={{background:"var(--card)",borderRadius:14,padding:24,border:"1px solid var(--border)",marginBottom:12}}>

              <div style={{background:"var(--bg)",borderRadius:9,padding:"12px 14px",border:"1px solid var(--border)"}}><div style={{color:"var(--t6)",fontSize:10,textTransform:"uppercase",fontWeight:600}}>Critical Flags</div><div style={{color:prCrit>0?"var(--red)":"var(--green)",fontSize:22,fontWeight:800,fontFamily:"var(--mono)"}}>{prCrit}</div></div>
              <div style={{background:"var(--bg)",borderRadius:9,padding:"12px 14px",border:"1px solid var(--border)"}}><div style={{color:"var(--t6)",fontSize:10,textTransform:"uppercase",fontWeight:600}}>Labs Overdue</div><div style={{color:prOverdue>0?"var(--amber)":"var(--green)",fontSize:22,fontWeight:800,fontFamily:"var(--mono)"}}>{prOverdue}</div></div>
              <div style={{background:"var(--bg)",borderRadius:9,padding:"12px 14px",border:"1px solid var(--border)"}}><div style={{color:"var(--t6)",fontSize:10,textTransform:"uppercase",fontWeight:600}}>Plans Signed</div><div style={{color:"var(--t1)",fontSize:22,fontWeight:800,fontFamily:"var(--mono)"}}>{prPatients.filter(p=>p.planStatus==="signed").length}</div></div>
            </div>
          </div>);
        })}
      </div>}

      {/* AUDIT LOG */}
      {adminTab==="audit"&&<div>
        <div style={{color:"var(--t5)",fontSize:13,marginBottom:18}}>System audit trail. Every action logged for compliance and liability protection.</div>
        {AUDIT_LOG.map((log,i)=><div key={i} style={{display:"flex",gap:14,padding:"12px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{color:"var(--t6)",fontSize:11,fontFamily:"var(--mono)",minWidth:160,flexShrink:0}}>{log.time}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <span style={{color:log.user==="System"?"var(--cyan)":"var(--t2)",fontWeight:600,fontSize:13}}>{log.user}</span>
              <span style={{color:"var(--t5)",fontSize:12}}>{log.action}</span>
            </div>
            <div style={{color:"var(--t5)",fontSize:12}}>{log.entity} {log.detail&&<span style={{color:"var(--t6)"}}>| {log.detail}</span>}</div>
          </div>
        </div>)}
      </div>}
    </div>
  </div>);
}

  for(const[m,v] of Object.entries(data.values)){
    const vl=v.filter(x=>x!=null);if(vl.length<2)continue;const d=MD[m];if(!d)continue;
    const first=vl[0],last=vl[vl.length-1];
    if((st(first,m)!=="ok"&&st(last,m)==="ok")||(st(first,m)==="high"&&last<first&&d.hi<999)){
      improvements.push({marker:m,first,last,unit:d.u,pct:((last-first)/Math.abs(first)*100).toFixed(0)});

  const flagged=[];

      </div>
    </div>
  </div>);
}

// ── MAIN APP ──
function App(){
  const[data,setData]=useState(DEMO);
  const[cat,setCat]=useState("all");
  const[exp,setExp]=useState(new Set(["Hematocrit","ALT","Total Testosterone","LDL","Ferritin","HDL"]));
  const[tab,setTab]=useState("dashboard");
  const[view,setView]=useState("provider"); // "provider" | "patient" | "admin"
  const has=data.draws.length>0;
  const lr=useMemo(()=>has?runLR(data):[],[data,has]);
  const qr=useMemo(()=>runQR(data.questionnaire,data.values),[data]);
  const all=[...lr,...qr];const crit=all.filter(r=>r.sev==="critical").length;const warn=all.filter(r=>r.sev==="warning").length;
  const toggle=m=>{const n=new Set(exp);if(n.has(m))n.delete(m);else n.add(m);setExp(n);};
  const cats=useMemo(()=>{const o={};for(const[m,v]of Object.entries(data.values)){const d=MD[m];if(!d)continue;if(!o[d.c])o[d.c]=[];if(v.some(x=>x!=null))o[d.c].push(m);}return o;},[data]);
  const fc=cat==="all"?cats:{[cat]:cats[cat]||[]};
  const wins=useMemo(()=>{let c=0;for(const[m,v]of Object.entries(data.values)){const vl=v.filter(x=>x!=null);if(vl.length<2)continue;const d=MD[m];if(!d)continue;const prev=vl[vl.length-2],last=vl[vl.length-1];if(st(prev,m)!=="ok"&&st(last,m)==="ok")c++;else if(st(prev,m)==="high"&&last<prev&&d.hi<999)c++;}return c;},[data]);
  const merge=(res)=>{const ed=[...data.draws];const ev={...data.values};for(const r of res){if(!r.data?.draws)continue;for(const draw of r.data.draws){const ei=ed.findIndex(d=>d.date===draw.date);if(ei>=0){for(const[mk,val]of Object.entries(draw.markers||{})){if(!ev[mk])ev[mk]=new Array(ed.length).fill(null);while(ev[mk].length<ed.length)ev[mk].push(null);ev[mk][ei]=val;}}else{ed.push({date:draw.date,lab:draw.lab,fasting:draw.fasting??true});for(const mk of Object.keys(ev))ev[mk].push(null);const ni=ed.length-1;for(const[mk,val]of Object.entries(draw.markers||{})){if(!ev[mk])ev[mk]=new Array(ed.length).fill(null);while(ev[mk].length<ed.length)ev[mk].push(null);ev[mk][ni]=val;}}}}setData({...data,draws:ed,values:ev});setTab("dashboard");};
  const handleQS=answers=>{setData({...data,questionnaire:[...(data.questionnaire||[]),{date:data.draws[data.draws.length-1]?.date||"Current",answers}]});};
  const tabs=[{k:"dashboard",l:"Dashboard"},{k:"recommendations",l:"Recs ("+all.length+")"},{k:"treatmentplan",l:"Treatment Plan"},{k:"questionnaire",l:"Questionnaire"},{k:"timeline",l:"History"},{k:"summary",l:"Summary"},{k:"upload",l:"Upload"}];

  if(view==="admin") return <AdminPortal onSelectPatient={(pt)=>{setView("provider");}} onBack={()=>setView("provider")}/>;
  if(view==="patient"&&has) return <PatientPortal data={data} onBack={()=>setView("provider")}/>;

  return(<div style={{fontFamily:"var(--font)",background:"var(--bg)",minHeight:"100vh",color:"var(--t3)"}}>
    <div style={{background:"linear-gradient(180deg,#0c1220,var(--card))",borderBottom:"1px solid var(--border)",padding:"18px 24px"}}>
      <div className="hdr-wrap" style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}>
        <a href="/" style={{display:"flex",alignItems:"center",gap:12,textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,var(--green),var(--cyan))",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:"var(--bg)",fontFamily:"Outfit"}}>M</div><div><h1 style={{margin:0,fontSize:19,fontWeight:800,color:"var(--t1)",fontFamily:"var(--head)"}}>MedLabIQ</h1><div style={{fontSize:11,color:"var(--t7)"}}>Clinical Lab Intelligence</div></div></a>
        <div className="hdr-right" style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {has&&<div style={{background:"var(--amber)15",border:"1px solid var(--amber)30",borderRadius:8,padding:"6px 14px",fontSize:12,color:"var(--amber)",fontWeight:600}}>DEMO</div>}
          {has&&<div style={{background:"var(--card)",borderRadius:9,padding:"8px 14px",border:"1px solid var(--border)",fontSize:13}}><span style={{color:"var(--t6)"}}>Patient: </span><span style={{color:"var(--t2)",fontWeight:600}}>{data.patient.name}</span>{" | "}{data.draws.length} draws</div>}
          <button onClick={()=>setView("admin")} style={{background:"linear-gradient(135deg,var(--purple),#6d4ec4)",border:"none",borderRadius:9,padding:"8px 14px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>Clinic Admin</button>
          {has&&<button onClick={()=>setView("patient")} style={{background:"linear-gradient(135deg,var(--cyan),#1a9aab)",border:"none",borderRadius:9,padding:"8px 14px",color:"#000",cursor:"pointer",fontSize:12,fontWeight:700}}>Patient Portal</button>}
        </div>
      </div>
    </div>
    <div className="page-pad" style={{maxWidth:1280,margin:"0 auto",padding:24}}>
      {has&&tab!=="upload"&&<div className="stat-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12,marginBottom:26}}>
        {[{l:"Action Items",v:crit,c:crit>0?"var(--red)":"var(--green)",s:"critical"},{l:"Monitor",v:warn,c:warn>0?"var(--amber)":"var(--green)",s:"warnings"},{l:"Improving",v:wins,c:"var(--green)",s:"trending better"},{l:"Tracked",v:Object.values(data.values).filter(v=>v.some(x=>x!=null)).length,c:"var(--purple)",s:"markers"}].map((x,i)=><div key={i} style={{background:"var(--card)",borderRadius:14,padding:"18px 22px",border:"1px solid var(--border)"}}><div style={{color:"var(--t6)",fontSize:10.5,textTransform:"uppercase",fontWeight:700,letterSpacing:"0.08em"}}>{x.l}</div><div className="sn" style={{fontSize:34,fontWeight:800,color:x.c,fontFamily:"var(--mono)",marginTop:5}}>{x.v}</div><div style={{fontSize:12,color:"var(--t7)"}}>{x.s}</div></div>)}
      </div>}
      {has&&<div className="tab-nav" style={{display:"flex",gap:3,marginBottom:26,background:"var(--card)",borderRadius:12,padding:4,border:"1px solid var(--border)",flexWrap:"wrap"}}>{tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{flex:"1 1 auto",padding:"11px 14px",border:"none",borderRadius:9,background:tab===t.k?"var(--border)":"transparent",color:tab===t.k?"var(--t2)":"var(--t6)",cursor:"pointer",fontSize:12.5,fontWeight:tab===t.k?600:400,whiteSpace:"nowrap"}}>{t.l}</button>)}</div>}

      {(tab==="upload"||!has)&&<div><PDFUp onDone={merge} existing={data.draws.map(d=>d.date)}/>{has&&<div style={{textAlign:"center",marginTop:18}}><button onClick={()=>setTab("dashboard")} style={{background:"var(--purple)",border:"none",borderRadius:10,padding:"13px 36px",color:"#fff",fontWeight:700,cursor:"pointer"}}>Back to Dashboard</button></div>}</div>}

      {has&&tab==="dashboard"&&<div>
        <div className="cat-filter" style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:22}}><button onClick={()=>setCat("all")} style={{background:cat==="all"?"var(--border)":"var(--card)",border:"1px solid "+(cat==="all"?"var(--border2)":"var(--border)"),borderRadius:9,padding:"7px 16px",fontSize:12,color:cat==="all"?"var(--t2)":"var(--t6)",cursor:"pointer"}}>All</button>{Object.entries(CC).map(([k,cfg])=>{if(!cats[k])return null;return<button key={k} onClick={()=>setCat(k)} style={{background:cat===k?cfg.color+"12":"var(--card)",border:"1px solid "+(cat===k?cfg.color+"35":"var(--border)"),borderRadius:9,padding:"7px 16px",fontSize:12,color:cat===k?cfg.color:"var(--t6)",cursor:"pointer"}}>{cfg.label}</button>;})}</div>
        {Object.entries(fc).map(([ct,markers])=>{if(!markers?.length)return null;const cfg=CC[ct];return<div key={ct} style={{marginBottom:30}}><div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14,paddingBottom:10,borderBottom:"1px solid "+(cfg?.color||"#253040")+"18"}}><span style={{color:cfg?.color,fontSize:16,fontWeight:700,fontFamily:"var(--head)"}}>{cfg?.label||ct}</span><span style={{color:"var(--t8)",fontSize:12}}>({markers.length})</span></div><div style={{display:"flex",flexDirection:"column",gap:9}}>{markers.map(m=><MCard key={m} marker={m} values={data.values[m]} draws={data.draws} open={exp.has(m)} toggle={()=>toggle(m)}/>)}</div></div>;})}
      </div>}

      {has&&tab==="recommendations"&&<div>
        <div style={{marginBottom:18,color:"var(--t5)",fontSize:13}}>Auto-generated from labs{qr.length>0?" and questionnaire":""}. {crit>0&&<span style={{color:"var(--red)",fontWeight:600}}>{crit} critical.</span>}</div>
        {lr.map((r,i)=><div key={i} style={{background:"var(--card)",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",background:SC[r.sev]+"14",color:SC[r.sev]}}>{r.sev==="critical"?"ACTION REQUIRED":r.sev==="warning"?"MONITOR":"NOTE"}</span><span style={{color:"var(--t2)",fontWeight:600}}>{r.marker}</span></div><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.7}}>{r.rec}</div></div>)}
        {qr.length>0&&<div style={{marginTop:20}}><h4 style={{color:"var(--amber)",fontWeight:700,marginBottom:12}}>Questionnaire Cross-Ref</h4>{qr.map((r,i)=><div key={"q"+i} style={{background:"var(--card)",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}}><span style={{display:"inline-block",padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,background:SC[r.sev]+"14",color:SC[r.sev],marginBottom:8}}>MONITOR</span><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.7}}>{r.rec}</div></div>)}</div>}
        {all.length===0&&<div style={{padding:32,textAlign:"center",color:"var(--t6)"}}><div style={{fontSize:36,color:"var(--green)",marginBottom:8}}>&#10003;</div>All clear.</div>}
      </div>}

      {has&&tab==="questionnaire"&&<div><div style={{marginBottom:18,color:"var(--t5)",fontSize:13}}>Patient symptoms cross-referenced with labs.</div><QS questionnaire={data.questionnaire} values={data.values} onSave={handleQS}/></div>}

      {has&&tab==="treatmentplan"&&<TreatmentPlan data={data} labRecs={lr} qsRecs={qr}/>}
      {has&&tab==="timeline"&&<div><div style={{marginBottom:18,color:"var(--t5)",fontSize:13}}>Chronological patient history.</div><TL timeline={data.timeline}/></div>}

      {has&&tab==="summary"&&<div style={{background:"var(--card)",borderRadius:14,padding:30,border:"1px solid var(--border)"}}>
        <h2 style={{margin:"0 0 5px",color:"var(--t1)",fontSize:21,fontWeight:800,fontFamily:"var(--head)"}}>Lab Review Summary</h2>
        <div style={{color:"var(--t6)",fontSize:13,marginBottom:26}}>Patient: {data.patient.name} | {data.draws.length} draws ({data.draws[0]?.date} - {data.draws[data.draws.length-1]?.date})</div>
        <div style={{marginBottom:28}}><h3 style={{color:"var(--green)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>&#10003; What's Working</h3><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>{Object.entries(data.values).map(([m,v])=>{const vl=v.filter(x=>x!=null);if(vl.length<2)return null;const d=MD[m];if(!d)return null;const first=vl[0],last=vl[vl.length-1];if((st(first,m)!=="ok"&&st(last,m)==="ok")||(st(first,m)==="high"&&last<first&&d.hi<999)){const pct=((last-first)/Math.abs(first)*100).toFixed(0);return<div key={m}>&#10003; <strong>{m}</strong>: {first} &#8594; {last} {d.u} ({pct>0?"+":""}{pct}%)</div>;}return null;}).filter(Boolean)}</div></div>
        <div style={{marginBottom:28}}><h3 style={{color:"var(--red)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>&#9888; Action Items</h3>{all.length>0?<div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>{all.map((r,i)=><div key={i} style={{marginBottom:10,paddingLeft:18,borderLeft:"3px solid "+SC[r.sev]}}><strong style={{color:SC[r.sev]}}>{i+1}. {r.marker||"Questionnaire"}</strong>: {r.rec}</div>)}</div>:<div style={{color:"var(--green)"}}>All clear.</div>}</div>
        <div style={{marginBottom:24}}><h3 style={{color:"var(--amber)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>Re-Add to Next Panel</h3><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>{Object.entries(data.values).map(([m,v])=>{if(v.length<2)return null;if(v.slice(-2).every(x=>x==null)&&v.some(x=>x!=null)){const li=v.length-1-[...v].reverse().findIndex(x=>x!=null);return<div key={m}>&#8226; <strong>{m}</strong> (last: {data.draws[li]?.date})</div>;}return null;}).filter(Boolean)}</div></div>
        {!data.draws[data.draws.length-1]?.fasting&&<div style={{padding:"12px 18px",background:"var(--amber)0e",borderRadius:10,border:"1px solid var(--amber)25",color:"var(--amber)",fontSize:13,marginBottom:20}}><strong>Note:</strong> Last draw was non-fasting. Next lipid panel should be fasting.</div>}
        <div style={{padding:"14px 18px",background:"var(--bg)",borderRadius:10,color:"var(--t7)",fontSize:11,lineHeight:1.7}}>Auto-generated. Not medical advice. Powered by MedLabIQ.</div>
      </div>}
    </div>
  </div>);
}
ReactDOM.render(<App/>, document.getElementById('root'));
</script></body></html>
