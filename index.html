// ── RULES ──
const QS_FIELDS=[{key:"sleep",label:"Sleep Quality",desc:"1=terrible, 5=excellent"},{key:"energy",label:"Energy Level",desc:"1=exhausted, 5=high energy"},{key:"libido",label:"Libido",desc:"1=absent, 5=strong"},{key:"mood",label:"Mood & Motivation",desc:"1=flat, 5=driven"},{key:"hydration",label:"Hydration",desc:"1=poor, 5=optimal"},{key:"brain_fog",label:"Brain Fog",desc:"1=clear, 5=severe"},{key:"joint_pain",label:"Joint Pain",desc:"1=none, 5=severe"},{key:"digestion",label:"Digestion",desc:"1=poor, 5=excellent"},{key:"stress",label:"Stress",desc:"1=low, 5=overwhelming"},{key:"exercise",label:"Exercise",desc:"1=none, 5=6+ days/week"}];

const QS_RULES=[
  {check:(a,v)=>a.energy<=2&&v["Vitamin D"]&&v["Vitamin D"].filter(x=>x!=null).slice(-1)[0]<30,sev:"warning",rec:"Low energy + Vitamin D insufficient. Supplement 5,000-10,000 IU/day, retest 8-12 weeks."},
  {check:(a,v)=>a.energy<=2&&v["Free Testosterone"]&&v["Free Testosterone"].filter(x=>x!=null).slice(-1)[0]<15,sev:"warning",rec:"Low energy + Free T low-normal. Consider protocol optimization."},
  {check:(a,v)=>a.hydration<=2&&v["Hematocrit"]&&v["Hematocrit"].filter(x=>x!=null).slice(-1)[0]>51,sev:"warning",rec:"Poor hydration + elevated hematocrit. Dehydration directly increases hematocrit. Mandate 100+ oz water daily and retest BEFORE further interventions."},
  {check:(a,v)=>a.libido<=2&&v["Free Testosterone"]&&v["Free Testosterone"].filter(x=>x!=null).slice(-1)[0]<15,sev:"warning",rec:"Low libido + Free T low-normal. Primary driver. Optimize free T through dose adjustment or SHBG management."},
  {check:(a,v)=>a.exercise<=1&&v["HDL"]&&v["HDL"].filter(x=>x!=null).slice(-1)[0]<40,sev:"warning",rec:"Minimal exercise + HDL low. Aerobic exercise is the #1 intervention for raising HDL. Recommend 150+ min/week."},
  {check:(a,v)=>a.brain_fog>=4&&v["Vitamin D"]&&v["Vitamin D"].filter(x=>x!=null).slice(-1)[0]<25,sev:"info",rec:"Brain fog + Vitamin D very low. Associated with cognitive impairment. Priority supplementation."},
  {check:(a,v)=>a.digestion<=2&&v["ALT"]&&v["ALT"].filter(x=>x!=null).slice(-1)[0]>40,sev:"info",rec:"Poor digestion + ALT elevated. Liver stress may contribute. Audit supplements, consider digestive enzymes."},
  {check:(a,v)=>a.sleep<=2&&v["Cortisol AM"]&&v["Cortisol AM"].filter(x=>x!=null).slice(-1)[0]>18,sev:"info",rec:"Poor sleep + cortisol elevated. HPA axis dysregulation. Consider ashwagandha, magnesium glycinate."},
];

const RULES=[
  {m:"Hematocrit",fn:v=>{const r=v.filter(x=>x!=null).slice(-2);return r.length>=2&&r.every(x=>x>51);},s:"critical",c:"CBC",t:"Hematocrit elevated on consecutive draws. Discuss therapeutic phlebotomy. Risk: blood viscosity, thrombotic events. Evaluate testosterone dose."},
  {m:"ALT",fn:v=>{const s=v.filter(x=>x!=null);if(s.length<2)return false;return s[s.length-1]>s[s.length-2]&&s[s.length-1]>50;},s:"critical",c:"MET",t:"ALT trending upward above reference. Recommend abdominal ultrasound. Audit liver-metabolized supplements."},
  {m:"LDL",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>=160;},s:"critical",c:"LIP",t:"LDL high-risk (160+). Discuss dietary intervention. Consider ApoB/Lp(a) testing. Evaluate lipid-lowering therapy."},
  {m:"Hemoglobin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>17.7;},s:"warning",c:"CBC",t:"Hemoglobin above reference. Correlates with hematocrit. Monitor."},
  {m:"MCV",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>97;},s:"warning",c:"CBC",t:"MCV elevated (macrocytosis). Check B12/folate, alcohol, medications."},
  {m:"Eosinophils %",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>5;},s:"info",c:"CBC",t:"Eosinophils trending up. Consider allergy panel if persistent."},
  {m:"HDL",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<40;},s:"warning",c:"LIP",t:"HDL below protective threshold. Recommend omega-3, aerobic exercise, niacin discussion."},
  {m:"Triglycerides",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>150;},s:"warning",c:"LIP",t:"Triglycerides elevated. Verify fasting. Reduce refined carbs. Consider omega-3."},
  {m:"Ferritin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>400;},s:"critical",c:"IRN",t:"Ferritin above reference. Iron overload risk. Therapeutic phlebotomy recommended."},
  {m:"Vitamin D",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<30;},s:"warning",c:"VIT",t:"Vitamin D insufficient. Supplement 5,000-10,000 IU daily. Recheck 8-12 weeks."},
  {m:"Free Testosterone",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<10;},s:"warning",c:"HOR",t:"Free T below optimal. Evaluate SHBG and protocol adjustment."},
  {m:"Estradiol",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>42.6;},s:"warning",c:"HOR",t:"Estradiol elevated. Consider AI adjustment if symptomatic."},
  {m:"IGF-1",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>290;},s:"info",c:"HOR",t:"IGF-1 above range. If using GH/peptides, dose may be high."},

// ── HELPERS ──
const st=(v,m)=>{const d=MD[m];if(!d||v==null)return"none";if(v<d.lo)return"low";if(v>d.hi)return"high";return"ok";};
const tr=(vals)=>{const v=vals.filter(x=>x!=null);if(v.length<2)return"flat";const p=((v[v.length-1]-v[v.length-2])/Math.abs(v[v.length-2]||1))*100;return p>5?"up":p<-5?"dn":"flat";};
function runLabRecs(d){const out=[];for(const r of RULES){const mv=d.values[r.m];if(!mv)continue;try{if(r.fn(mv))out.push({marker:r.m,sev:r.s,cat:r.c,rec:r.t});}catch(e){}}out.sort((a,b)=>({critical:0,warning:1,info:2}[a.sev])-({critical:0,warning:1,info:2}[b.sev]));return out;}
function runQSRecs(qs,vals){if(!qs||!qs.length)return[];const a=qs[qs.length-1].answers;const out=[];for(const r of QS_RULES){try{if(r.check(a,vals))out.push({sev:r.sev,rec:r.rec});}catch(e){}}return out;}

// ── PDF EXTRACT ──
async function extractPDF(b64,dates){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:"Extract ALL lab values from this PDF into JSON. Match to: "+Object.keys(MD).join(", ")+". Aliases: SGPT=ALT, SGOT=AST, GFR=eGFR, 25-Hydroxy Vitamin D=Vitamin D, Hemoglobin A1c=HbA1c, Sex Hormone Binding Globulin=SHBG. Format dates Mon YYYY. ONLY JSON, no markdown:\n{\"draws\":[{\"date\":\"Mar 2026\",\"lab\":\"Labcorp\",\"fasting\":true,\"markers\":{\"Hematocrit\":56.1}}],\"patient_name\":null,\"patient_dob\":null}"}]}]})});
  const d=await r.json();const txt=d.content?.map(c=>c.text||"").join("")||"";return JSON.parse(txt.replace(/```json|```/g,"").trim());
}

// ── CHART COMPONENT ──
function MChart({marker,values,draws}){
  const d=MD[marker];if(!d)return null;
  const pts=draws.map((dr,i)=>({date:dr.date,value:values[i]})).filter(x=>x.value!=null);
  if(!pts.length)return <div style={{color:"#5a6577",fontSize:13,padding:16}}>No data</div>;
  const vals=pts.map(x=>x.value);const mn=Math.min(...vals,d.lo)*0.88;const mx=Math.max(...vals,d.hi)*1.12;
  const clr=CC[d.c]?.color||"#9370e0";const gid="g"+marker.replace(/[\s%]/g,'');
  return(
    <div className="chart-wrap" style={{width:"100%",height:210}}>
      <ResponsiveContainer>
        <ComposedChart data={pts} margin={{top:12,right:12,left:-8,bottom:0}}>
          <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={clr} stopOpacity={0.25}/><stop offset="100%" stopColor={clr} stopOpacity={0.02}/></linearGradient></defs>
          <CartesianGrid strokeDasharray="3 3" stroke="#1a2233" vertical={false}/>
          <XAxis dataKey="date" tick={{fill:"#7a8699",fontSize:11}} axisLine={{stroke:"#1a2233"}} tickLine={false}/>
          <YAxis domain={[mn,mx]} tick={{fill:"#7a8699",fontSize:11}} axisLine={{stroke:"#1a2233"}} tickLine={false}/>
          <Tooltip contentStyle={{background:"#141c2b",border:"1px solid #253040",borderRadius:10,color:"#c8d1de",fontSize:12,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}} formatter={v=>[v+" "+d.u,marker]}/>
          {d.hi<999&&<ReferenceLine y={d.hi} stroke="#e0525240" strokeDasharray="6 4"/>}
          {d.lo>0&&<ReferenceLine y={d.lo} stroke="#d4973b40" strokeDasharray="6 4"/>}
          <Area type="monotone" dataKey="value" fill={"url(#"+gid+")"} stroke="none"/>
          <Line type="monotone" dataKey="value" stroke={clr} strokeWidth={2.5} dot={{r:5,fill:"#0c1220",stroke:clr,strokeWidth:2.5}} activeDot={{r:8}}/>
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );
}

// ── MARKER CARD ──
function MCard({marker,values,draws,open,toggle}){
  const d=MD[marker];if(!d)return null;
  const vv=values.filter(v=>v!=null);if(!vv.length)return null;
  const last=vv[vv.length-1];const li=values.length-1-[...values].reverse().findIndex(v=>v!=null);
  const s=st(last,marker);const t=tr(values);const sCol=s==="ok"?"var(--green)":s==="high"?"var(--red)":"var(--amber)";
  return(
    <div style={{background:"var(--card)",border:"1px solid "+(s==="high"||s==="low"?SC[s==="high"?"critical":"warning"]+"30":"var(--border)"),borderRadius:14,overflow:"hidden"}}>
      <div className="marker-header" onClick={toggle} style={{padding:"15px 20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>

        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{textAlign:"right"}}>
            <span className="marker-val" style={{color:sCol,fontWeight:700,fontSize:20,fontFamily:"var(--mono)"}}>{last}</span>
            <span style={{color:"var(--t6)",fontSize:10.5,display:"block"}}>{draws[li]?.date}</span>
          </div>
          {t==="up"&&<span style={{color:"var(--red)"}}>&#9650;</span>}
          {t==="dn"&&<span style={{color:"var(--green)"}}>&#9660;</span>}
          <span style={{color:"var(--t6)"}}>{open?"&#9652;":"&#9662;"}</span>
        </div>
      </div>
      {open&&<div className="marker-body" style={{padding:"0 20px 20px"}}>
        <MChart marker={marker} values={values} draws={draws}/>
        <div className="marker-pills" style={{marginTop:14,display:"flex",flexWrap:"wrap",gap:7}}>
          {draws.map((dr,i)=>values[i]!=null&&<div key={i} style={{background:"var(--bg)",borderRadius:7,padding:"5px 10px",fontSize:11,color:"var(--t5)",border:"1px solid var(--border)"}}>
            <span style={{color:"var(--t2)",fontWeight:600}}>{dr.date}</span>{" | "}
            <span style={{color:st(values[i],marker)==="ok"?"var(--green)":st(values[i],marker)==="high"?"var(--red)":"var(--amber)",fontFamily:"var(--mono)",fontWeight:600}}>{values[i]}</span>{" | "}{dr.lab}
          </div>)}
        </div>
      </div>}
    </div>
  );
}

// ── QUESTIONNAIRE ──
function Questionnaire({questionnaire,values,onSave}){

  const[saved,setS]=useState(false);
  const qr=useMemo(()=>runQSRecs([{answers}],values),[answers,values]);
  const prev=questionnaire?.length?questionnaire[questionnaire.length-1]:null;
  const neg=k=>k==="brain_fog"||k==="joint_pain"||k==="stress";

        <div style={{display:"flex",gap:6}}>

            return <button key={n} onClick={()=>setA({...answers,[f.key]:n})} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"1px solid "+(act?col+"60":"var(--border)"),background:act?col+"18":"transparent",color:act?col:"var(--t6)",cursor:"pointer",fontSize:12,fontWeight:act?700:400}}>{n}</button>})}
        </div>

    </div>
    {qr.length>0&&<div style={{marginBottom:20}}>

      {qr.map((r,i)=><div key={i} style={{background:"var(--card)",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}}>
        <span style={{display:"inline-block",padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",background:SC[r.sev]+"14",color:SC[r.sev],marginBottom:8}}>{r.sev==="warning"?"MONITOR":"NOTE"}</span>
        <div style={{color:"var(--t4)",fontSize:13,lineHeight:1.7}}>{r.rec}</div>
      </div>)}

    <button onClick={()=>{onSave(answers);setS(true);setTimeout(()=>setS(false),2000);}} style={{background:saved?"var(--green)":"linear-gradient(135deg,var(--green),#2a9d54)",border:"none",borderRadius:10,padding:"13px 28px",color:"var(--bg)",fontWeight:700,fontSize:14,cursor:"pointer"}}>{saved?"Saved!":"Save Questionnaire"}</button>
  </div>);
}

// ── PDF UPLOADER ──
function PDFUp({onDone,existing}){
  const[files,setF]=useState([]);const[busy,setB]=useState(false);const[prog,setP]=useState("");const[res,setR]=useState([]);const ref=useRef();
  const go=async()=>{setB(true);const out=[];for(let i=0;i<files.length;i++){setP("Reading "+files[i].name+"...");try{const b64=await new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(",")[1]);r.onerror=()=>no(new Error("Fail"));r.readAsDataURL(files[i]);});const d=await extractPDF(b64,existing);out.push({file:files[i].name,data:d});}catch(e){out.push({file:files[i].name,err:e.message});}}setR(out);setB(false);};
  const totM=res.reduce((s,r)=>s+(r.data?.draws||[]).reduce((a,d)=>a+Object.keys(d.markers||{}).length,0),0);
  return(<div style={{background:"var(--card)",borderRadius:14,border:"1px solid var(--border)",padding:24}}>
    <h3 style={{margin:"0 0 6px",color:"var(--t2)",fontSize:16,fontWeight:700}}>Upload Lab PDFs</h3>
    <p style={{color:"var(--t6)",fontSize:13,margin:"0 0 18px"}}>Drop Labcorp, Quest, or any standard lab PDF. AI extracts all markers.</p>
    <div className="upload-zone" onClick={()=>ref.current?.click()} onDrop={e=>{e.preventDefault();setF(p=>[...p,...Array.from(e.dataTransfer.files).filter(f=>f.type==="application/pdf")]);}} onDragOver={e=>e.preventDefault()} style={{border:"2px dashed var(--border2)",borderRadius:12,padding:"36px 20px",textAlign:"center",cursor:"pointer",background:"var(--bg)"}}>
      <input ref={ref} type="file" accept=".pdf" multiple onChange={e=>setF(p=>[...p,...Array.from(e.target.files||[]).filter(f=>f.type==="application/pdf")])} style={{display:"none"}}/>
      <div style={{color:"var(--t5)",fontSize:14,fontWeight:500}}>Drop PDFs here or click to browse</div>
    </div>
    {files.length>0&&<div style={{marginTop:12}}>{files.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",background:"var(--bg)",borderRadius:9,border:"1px solid var(--border)",marginBottom:6}}><span style={{color:"var(--t4)",fontSize:13,flex:1}}>{f.name}</span>{!busy&&<span onClick={()=>setF(files.filter((_,x)=>x!==i))} style={{cursor:"pointer",color:"var(--t6)"}}>x</span>}</div>)}</div>}
    {files.length>0&&!busy&&!res.length&&<button onClick={go} style={{marginTop:12,background:"linear-gradient(135deg,var(--green),#2a9d54)",border:"none",borderRadius:10,padding:"13px",color:"var(--bg)",fontWeight:700,fontSize:14,cursor:"pointer",width:"100%"}}>Extract Labs from {files.length} PDF{files.length>1?"s":""}</button>}
    {busy&&<div style={{textAlign:"center",padding:"24px 0"}}><div style={{width:24,height:24,border:"3px solid var(--green)",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 10px"}}/><div style={{color:"var(--green)",fontSize:14,fontWeight:600}}>{prog}</div></div>}
    {res.length>0&&<div style={{marginTop:16}}>
      <div style={{background:"var(--bg)",borderRadius:12,padding:18,border:"1px solid var(--border)",marginBottom:14}}>
        <div style={{color:"var(--green)",fontSize:14,fontWeight:700,marginBottom:10}}>Extraction Complete</div>
        {res.map((r,i)=><div key={i} style={{marginBottom:8}}><div style={{color:"var(--t4)",fontSize:13,fontWeight:600}}>{r.file}</div>{r.err?<div style={{color:"var(--red)",fontSize:12}}>{r.err}</div>:r.data?.draws?.map((d,di)=><div key={di} style={{marginTop:5,padding:"7px 12px",background:"var(--card)",borderRadius:7,border:"1px solid var(--border)",fontSize:12,color:"var(--t5)"}}><span style={{color:"var(--t2)",fontWeight:600}}>{d.date}</span>{" | "}{d.lab}{" | "}<span style={{color:"var(--green)"}}>{Object.keys(d.markers||{}).length} markers</span></div>)}</div>)}
        <div style={{marginTop:14,padding:"11px 16px",background:"var(--green)0e",borderRadius:9,border:"1px solid var(--green)25"}}><span style={{color:"var(--green)",fontWeight:700,fontSize:14}}>{totM} marker values extracted</span></div>
      </div>
      <div style={{display:"flex",gap:12}}><button onClick={()=>{setR([]);setF([]);}} style={{flex:1,background:"var(--border)",border:"none",borderRadius:10,padding:13,color:"var(--t5)",cursor:"pointer",fontSize:13}}>Start Over</button><button onClick={()=>onDone(res)} style={{flex:2,background:"linear-gradient(135deg,var(--green),#2a9d54)",border:"none",borderRadius:10,padding:13,color:"var(--bg)",fontWeight:700,fontSize:14,cursor:"pointer"}}>Load Into Dashboard</button></div>
    </div>}
  </div>);
}

// ── MAIN APP ──
function App(){
  const[data,setData]=useState(DEMO);
  const[cat,setCat]=useState("all");
  const[exp,setExp]=useState(new Set(["Hematocrit","ALT","Total Testosterone","LDL","Ferritin","HDL"]));
  const[tab,setTab]=useState("dashboard");

  const has=data.draws.length>0;
  const labRecs=useMemo(()=>has?runLabRecs(data):[],[data,has]);
  const qsRecs=useMemo(()=>runQSRecs(data.questionnaire,data.values),[data]);
  const allRecs=[...labRecs,...qsRecs];
  const crit=allRecs.filter(r=>r.sev==="critical").length;
  const warn=allRecs.filter(r=>r.sev==="warning").length;
  const toggle=m=>{const n=new Set(exp);if(n.has(m))n.delete(m);else n.add(m);setExp(n);};
  const cats=useMemo(()=>{const o={};for(const[m,v]of Object.entries(data.values)){const d=MD[m];if(!d)continue;if(!o[d.c])o[d.c]=[];if(v.some(x=>x!=null))o[d.c].push(m);}return o;},[data]);
  const fc=cat==="all"?cats:{[cat]:cats[cat]||[]};
  const wins=useMemo(()=>{let c=0;for(const[m,v]of Object.entries(data.values)){const vl=v.filter(x=>x!=null);if(vl.length<2)continue;const d=MD[m];if(!d)continue;const prev=vl[vl.length-2],last=vl[vl.length-1];if(st(prev,m)!=="ok"&&st(last,m)==="ok")c++;else if(st(prev,m)==="high"&&last<prev&&d.hi<999)c++;}return c;},[data]);

  const merge=(newDraws,nm,db)=>{const ed=[...data.draws];const ev={...data.values};for(const draw of newDraws){const ei=ed.findIndex(d=>d.date===draw.date);if(ei>=0){for(const[mk,val]of Object.entries(draw.markers||{})){if(!ev[mk])ev[mk]=new Array(ed.length).fill(null);while(ev[mk].length<ed.length)ev[mk].push(null);ev[mk][ei]=val;}}else{ed.push({date:draw.date,lab:draw.lab,fasting:draw.fasting??true});for(const mk of Object.keys(ev))ev[mk].push(null);const ni=ed.length-1;for(const[mk,val]of Object.entries(draw.markers||{})){if(!ev[mk])ev[mk]=new Array(ed.length).fill(null);while(ev[mk].length<ed.length)ev[mk].push(null);ev[mk][ni]=val;}}}setData({...data,draws:ed,values:ev});setTab("dashboard");};
  const handlePDF=results=>{const all=[];for(const r of results)if(r.data?.draws)for(const d of r.data.draws)all.push(d);merge(all);};
  const handleQS=answers=>{setData({...data,questionnaire:[...(data.questionnaire||[]),{date:data.draws[data.draws.length-1]?.date||"Current",answers}]});};
  const clear=()=>{setData({patient:{name:"",dob:"",id:""},draws:[],values:{},questionnaire:[],timeline:[]});setTab("upload");};

  const tabs=[{k:"dashboard",l:"Dashboard"},{k:"recommendations",l:"Recommendations ("+allRecs.length+")"},{k:"questionnaire",l:"Questionnaire"},{k:"timeline",l:"Patient History"},{k:"summary",l:"Summary"},{k:"upload",l:"Upload Labs"}];

  return(<div style={{fontFamily:"var(--font)",background:"var(--bg)",minHeight:"100vh",color:"var(--t3)"}}>
    {/* HEADER */}
    <div style={{background:"linear-gradient(180deg,#0c1220,var(--card))",borderBottom:"1px solid var(--border)",padding:"18px 24px"}}>
      <div className="hdr-wrap" style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}>

          <div className="hdr-logo" style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,var(--green),var(--cyan))",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:"var(--bg)",fontFamily:"Outfit"}}>M</div>
          <div><h1 className="hdr-title" style={{margin:0,fontSize:19,fontWeight:800,color:"var(--t1)",letterSpacing:"-0.03em",fontFamily:"var(--head)"}}>MedLabIQ</h1><div className="hdr-subtitle" style={{fontSize:11,color:"var(--t7)",fontWeight:500}}>Clinical Lab Intelligence Platform</div></div>
        </div>
        <div className="hdr-right" style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {has&&<div style={{background:"var(--amber)15",border:"1px solid var(--amber)30",borderRadius:8,padding:"6px 14px",fontSize:12,color:"var(--amber)",fontWeight:600}}>DEMO</div>}
          {has&&<div style={{background:"var(--card)",borderRadius:9,padding:"8px 14px",border:"1px solid var(--border)",fontSize:13}}><span style={{color:"var(--t6)"}}>Patient: </span><span style={{color:"var(--t2)",fontWeight:600}}>{data.patient.name||"Unknown"}</span>{" | "}{data.draws.length} draws</div>}
          {has&&<button onClick={clear} style={{background:"var(--border)",border:"1px solid var(--border2)",borderRadius:9,padding:"8px 14px",color:"var(--t6)",cursor:"pointer",fontSize:12}}>New Patient</button>}

      {/* SUMMARY */}
      {has&&tab==="summary"&&<div className="summary-box" style={{background:"var(--card)",borderRadius:14,padding:30,border:"1px solid var(--border)"}}>
        <h2 style={{margin:"0 0 5px",color:"var(--t1)",fontSize:21,fontWeight:800,fontFamily:"var(--head)"}}>Lab Review Summary</h2>
        <div style={{color:"var(--t6)",fontSize:13,marginBottom:26}}>Patient: {data.patient.name} | DOB: {data.patient.dob} | {data.draws.length} draws ({data.draws[0]?.date} - {data.draws[data.draws.length-1]?.date})</div>
        <div style={{marginBottom:28}}><h3 style={{color:"var(--green)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>&#10003; What's Working</h3><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>
          {Object.entries(data.values).map(([m,v])=>{const vl=v.filter(x=>x!=null);if(vl.length<2)return null;const d=MD[m];if(!d)return null;const first=vl[0],last=vl[vl.length-1];if((st(first,m)!=="ok"&&st(last,m)==="ok")||(st(first,m)==="high"&&last<first&&d.hi<999)){const pct=((last-first)/Math.abs(first)*100).toFixed(0);return<div key={m}>&#10003; <strong>{m}</strong>: {first} &#8594; {last} {d.u} ({pct>0?"+":""}{pct}%)</div>;}return null;}).filter(Boolean)}
        </div></div>
        <div style={{marginBottom:28}}><h3 style={{color:"var(--red)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>&#9888; Action Items</h3>{allRecs.length>0?<div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>{allRecs.map((r,i)=><div key={i} style={{marginBottom:10,paddingLeft:18,borderLeft:"3px solid "+SC[r.sev]}}><strong style={{color:SC[r.sev]}}>{i+1}. {r.marker||"Questionnaire"}</strong>: {r.rec}</div>)}</div>:<div style={{color:"var(--green)"}}>All clear.</div>}</div>
        <div style={{marginBottom:24}}><h3 style={{color:"var(--amber)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>Re-Add to Next Panel</h3><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>
          {Object.entries(data.values).map(([m,v])=>{if(v.length<2)return null;if(v.slice(-2).every(x=>x==null)&&v.some(x=>x!=null)){const li=v.length-1-[...v].reverse().findIndex(x=>x!=null);return<div key={m}>&#8226; <strong>{m}</strong> (last: {data.draws[li]?.date})</div>;}return null;}).filter(Boolean)}
        </div></div>
        {!data.draws[data.draws.length-1]?.fasting&&<div style={{padding:"12px 18px",background:"var(--amber)0e",borderRadius:10,border:"1px solid var(--amber)25",color:"var(--amber)",fontSize:13,marginBottom:20}}><strong>Note:</strong> Last draw ({data.draws[data.draws.length-1].date}) was non-fasting. Next lipid panel should be fasting.</div>}
        <div style={{padding:"14px 18px",background:"var(--bg)",borderRadius:10,color:"var(--t7)",fontSize:11,lineHeight:1.7}}>Auto-generated for provider discussion. Not medical advice. All interpretation reviewed by treating clinician. Powered by MedLabIQ.</div>
      </div>}
    </div>
  </div>);
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script></body></html>
