<!DOCTYPE html>
<html lang="en">
<head>

<title>MedLabIQ - Clinical Lab Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c16;--card:#0f1726;--border:#182035;--border2:#253040;--t1:#f0f4f8;--t2:#e2e8f0;--t3:#c8d1de;--t4:#b0bac8;--t5:#7a8699;--t6:#5a6577;--t7:#4a5568;--t8:#3f4a5c;--red:#e05252;--amber:#d4973b;--green:#3bba6a;--blue:#4a90d9;--purple:#9370e0;--cyan:#2eb8c9;--pink:#d45fa0;--orange:#e07b3b;--font:'DM Sans','Outfit',-apple-system,sans-serif;--mono:'DM Mono','JetBrains Mono',monospace;--head:'Outfit','DM Sans',sans-serif}
body{background:var(--bg);color:var(--t3);font-family:var(--font);min-height:100vh}
input,select,textarea,button{font-family:var(--font)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:768px){
  .hdr-wrap{flex-direction:column!important;align-items:flex-start!important;gap:12px!important}
  .hdr-right{width:100%;flex-wrap:wrap!important;gap:8px!important}

  .stat-grid .sn{font-size:26px!important}
  .tab-nav{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important;scrollbar-width:none}
  .tab-nav::-webkit-scrollbar{display:none}
  .tab-nav>button{flex:0 0 auto!important;font-size:11px!important;padding:10px 10px!important}
  .cat-filter{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important;scrollbar-width:none}
  .cat-filter::-webkit-scrollbar{display:none}
  .cat-filter>button{flex:0 0 auto!important}
  .qs-grid{grid-template-columns:1fr!important}
  .page-pad{padding:16px!important}
  #root{overflow-x:hidden}
  button{min-height:38px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef}=React;

// ── SIMPLE SVG CHART (no external deps) ──
function SVGChart({marker,values,draws,def}){
  const pts=draws.map((dr,i)=>({date:dr.date,value:values[i]})).filter(x=>x.value!=null);
  if(!pts.length)return <div style={{color:"var(--t6)",fontSize:13,padding:16}}>No data</div>;
  const vals=pts.map(x=>x.value);
  const mn=Math.min(...vals,def.lo)*0.88;const mx=Math.max(...vals,def.hi)*1.12;
  const range=mx-mn||1;
  const W=600,H=200,PL=45,PR=15,PT=15,PB=30;
  const cw=W-PL-PR,ch=H-PT-PB;
  const clr=CC[def.c]?.color||"#9370e0";
  const toX=(i)=>PL+(i/(pts.length-1||1))*cw;
  const toY=(v)=>PT+ch-(((v-mn)/range)*ch);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(p.value).toFixed(1)}`).join(' ');
  const area=line+` L${toX(pts.length-1).toFixed(1)},${(PT+ch).toFixed(1)} L${toX(0).toFixed(1)},${(PT+ch).toFixed(1)} Z`;
  const hiY=def.hi<999?toY(def.hi):null;
  const loY=def.lo>0?toY(def.lo):null;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",maxHeight:210}}>
      <defs><linearGradient id={"gr_"+marker.replace(/[\s%]/g,'')} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={clr} stopOpacity="0.2"/><stop offset="100%" stopColor={clr} stopOpacity="0.02"/></linearGradient></defs>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(f=><line key={f} x1={PL} y1={PT+ch*f} x2={W-PR} y2={PT+ch*f} stroke="#1a2233" strokeWidth="1"/>)}
      {/* Ref lines */}
      {hiY!=null&&hiY>=PT&&hiY<=PT+ch&&<line x1={PL} y1={hiY} x2={W-PR} y2={hiY} stroke="#e0525240" strokeWidth="1" strokeDasharray="6 4"/>}
      {loY!=null&&loY>=PT&&loY<=PT+ch&&<line x1={PL} y1={loY} x2={W-PR} y2={loY} stroke="#d4973b40" strokeWidth="1" strokeDasharray="6 4"/>}
      {/* Area fill */}
      <path d={area} fill={`url(#gr_${marker.replace(/[\s%]/g,'')})`}/>
      {/* Line */}
      <path d={line} fill="none" stroke={clr} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {/* Dots and labels */}
      {pts.map((p,i)=><g key={i}>
        <circle cx={toX(i)} cy={toY(p.value)} r="5" fill="var(--bg)" stroke={clr} strokeWidth="2.5"/>
        <text x={toX(i)} y={toY(p.value)-10} textAnchor="middle" fill={clr} fontSize="10" fontWeight="600" fontFamily="var(--mono)">{p.value}</text>
        <text x={toX(i)} y={H-5} textAnchor="middle" fill="var(--t5)" fontSize="9" fontFamily="var(--font)">{p.date}</text>
      </g>)}
      {/* Y axis labels */}
      <text x={PL-5} y={PT+5} textAnchor="end" fill="var(--t6)" fontSize="9" fontFamily="var(--mono)">{mx.toFixed(0)}</text>
      <text x={PL-5} y={PT+ch} textAnchor="end" fill="var(--t6)" fontSize="9" fontFamily="var(--mono)">{mn.toFixed(0)}</text>
      {hiY!=null&&hiY>=PT&&hiY<=PT+ch&&<text x={W-PR+3} y={hiY+3} fill="#e05252" fontSize="8" fontFamily="var(--mono)">H:{def.hi}</text>}
      {loY!=null&&loY>=PT&&loY<=PT+ch&&<text x={W-PR+3} y={loY+3} fill="#d4973b" fontSize="8" fontFamily="var(--mono)">L:{def.lo}</text>}
    </svg>
  );
}

// ── MARKER DEFS ──
const MD={
  "Hematocrit":{u:"%",lo:37.5,hi:51.0,c:"CBC"},"Hemoglobin":{u:"g/dL",lo:13.0,hi:17.7,c:"CBC"},"RBC":{u:"x10E6/uL",lo:4.14,hi:5.80,c:"CBC"},"MCV":{u:"fL",lo:79,hi:97,c:"CBC"},"WBC":{u:"x10E3/uL",lo:3.4,hi:10.8,c:"CBC"},"Platelets":{u:"x10E3/uL",lo:150,hi:379,c:"CBC"},"Eosinophils %":{u:"%",lo:0,hi:5,c:"CBC"},
  "ALT":{u:"IU/L",lo:0,hi:50,c:"MET"},"AST":{u:"IU/L",lo:0,hi:40,c:"MET"},"Glucose":{u:"mg/dL",lo:65,hi:99,c:"MET"},"eGFR":{u:"mL/min",lo:60,hi:999,c:"MET"},"HbA1c":{u:"%",lo:4.0,hi:5.6,c:"MET"},"Fasting Insulin":{u:"uIU/mL",lo:2.6,hi:24.9,c:"MET"},
  "Total Cholesterol":{u:"mg/dL",lo:100,hi:199,c:"LIP"},"LDL":{u:"mg/dL",lo:0,hi:129,c:"LIP"},"HDL":{u:"mg/dL",lo:40,hi:999,c:"LIP"},"Triglycerides":{u:"mg/dL",lo:0,hi:149,c:"LIP"},"VLDL":{u:"mg/dL",lo:5,hi:40,c:"LIP"},
  "Total Testosterone":{u:"ng/dL",lo:264,hi:916,c:"HOR"},"Free Testosterone":{u:"pg/mL",lo:8.7,hi:25.1,c:"HOR"},"SHBG":{u:"nmol/L",lo:16.5,hi:55.9,c:"HOR"},"Estradiol":{u:"pg/mL",lo:7.6,hi:42.6,c:"HOR"},"Estrone":{u:"pg/mL",lo:0,hi:68,c:"HOR"},"DHEA-S":{u:"ug/dL",lo:138.5,hi:475.2,c:"HOR"},"IGF-1":{u:"ng/mL",lo:95,hi:290,c:"HOR"},"Prolactin":{u:"ng/mL",lo:3.9,hi:22.7,c:"HOR"},"PSA":{u:"ng/mL",lo:0,hi:4.0,c:"HOR"},"Cortisol AM":{u:"ug/dL",lo:6.2,hi:19.4,c:"HOR"},"Progesterone":{u:"ng/mL",lo:0,hi:0.5,c:"HOR"},
  "TSH":{u:"uIU/mL",lo:0.45,hi:4.5,c:"THY"},"Free T3":{u:"pg/mL",lo:2.0,hi:4.4,c:"THY"},"Total T4":{u:"ug/dL",lo:4.5,hi:12.0,c:"THY"},"Reverse T3":{u:"ng/dL",lo:9.2,hi:24.1,c:"THY"},
  "Ferritin":{u:"ng/mL",lo:30,hi:400,c:"IRN"},
  "Vitamin D":{u:"ng/mL",lo:30,hi:100,c:"VIT"},"B12":{u:"pg/mL",lo:232,hi:1245,c:"VIT"},
};
const CC={CBC:{color:"#e05252",label:"Complete Blood Count"},MET:{color:"#d4973b",label:"Metabolic Panel"},LIP:{color:"#d45fa0",label:"Lipid Panel"},HOR:{color:"#9370e0",label:"Hormone Panel"},THY:{color:"#2eb8c9",label:"Thyroid Panel"},IRN:{color:"#e07b3b",label:"Iron / Ferritin"},VIT:{color:"#3bba6a",label:"Vitamins"}};
const SC={critical:"#e05252",warning:"#d4973b",info:"#4a90d9"};

// ── DEMO DATA ──
const DEMO={patient:{name:"John Doe",dob:"01/15/1985",id:"EH-JD001"},draws:[{date:"Nov 2024",lab:"Labcorp",fasting:true},{date:"Jan 2025",lab:"Labcorp",fasting:true},{date:"Jun 2025",lab:"Labcorp",fasting:true},{date:"Oct 2025",lab:"Quest",fasting:true},{date:"Dec 2025",lab:"Labcorp",fasting:true},{date:"Mar 2026",lab:"Labcorp",fasting:false}],values:{"Hematocrit":[57.3,54.6,null,48.9,51.1,56.1],"Hemoglobin":[19.0,18.6,null,16.2,16.9,17.8],"RBC":[5.82,5.70,null,4.95,5.07,5.59],"MCV":[99,96,null,102,101,100],"WBC":[5.9,6.9,10.1,7.4,6.1,4.6],"Platelets":[227,256,229,187,322,253],"Eosinophils %":[2,null,null,null,null,9],"ALT":[null,39,18,50,44,65],"AST":[null,39,16,36,null,31],"Glucose":[null,79,86,61,null,75],"eGFR":[null,119,116,121,null,118],"Total Cholesterol":[null,184,null,236,218,null],"LDL":[null,139,null,149,null,167],"HDL":[null,28,null,18,null,34],"Triglycerides":[null,89,null,369,null,91],"VLDL":[null,null,null,69,null,null],"Total Testosterone":[null,1500,null,483,1288,601],"Free Testosterone":[null,44.4,null,20.8,null,11.9],"SHBG":[null,null,null,7.8,35.0,36.6],"Estradiol":[null,74.8,null,28.6,null,30.5],"Estrone":[null,null,null,96,null,21],"DHEA-S":[227.1,null,null,247.0,null,null],"IGF-1":[303,null,null,322,null,null],"Prolactin":[18.2,null,null,22.3,null,null],"PSA":[0.3,null,null,0.4,null,null],"Cortisol AM":[21,null,null,15.4,null,null],"Progesterone":[0.5,null,null,0.2,null,null],"TSH":[1.18,null,null,1.56,null,0.607],"Free T3":[3.7,null,null,3.3,null,3.3],"Total T4":[null,null,null,null,null,6.1],"Reverse T3":[null,null,null,18.6,null,11.5],"Ferritin":[null,907,402,1167,313,311],"Vitamin D":[40.9,null,null,22.1,null,null],"B12":[843,null,null,907,null,null],"HbA1c":[4.8,null,null,5.0,null,null],"Fasting Insulin":[4.5,null,null,6.6,null,null]},
  questionnaire:[{date:"Oct 2025",answers:{sleep:3,energy:2,libido:2,mood:3,hydration:2,brain_fog:4,joint_pain:2,digestion:3,stress:4,exercise:2}},{date:"Mar 2026",answers:{sleep:4,energy:3,libido:3,mood:4,hydration:3,brain_fog:2,joint_pain:2,digestion:4,stress:3,exercise:3}}],
  timeline:[{date:"Nov 2024",notes:"Baseline. Hematocrit 57.3% (HIGH). Hemoglobin 19.0 (HIGH). Vitamin D 40.9. IGF-1 303 (above range). Cortisol 21 (elevated)."},{date:"Jan 2025",notes:"Testosterone 1500 (supraphysiologic). Estradiol 74.8 (HIGH). Free T 44.4. ALT/AST 39. Ferritin 907 (HIGH). HDL 28 (LOW)."},{date:"Jun 2025",notes:"Ferritin dropping to 402. ALT improved to 18. Limited panel."},{date:"Oct 2025",notes:"LIPID CRISIS: Trigs 369, HDL 18, VLDL 69. Ferritin peaked 1167. SHBG 7.8 (suppressed). Vitamin D 22.1 (LOW)."},{date:"Dec 2025",notes:"Recovery. Ferritin normalized 313. SHBG 35.0. Testosterone 1288."},{date:"Mar 2026",notes:"Current. Hematocrit 56.1% (CRITICAL). ALT 65 (highest, trending up). LDL 167 (high risk). Trigs corrected 91. HDL 34 (improving). SHBG 36.6. Estradiol 30.5 (normal). TSH 0.607. T 601. Free T 11.9 (low-normal). Non-fasting."}]
};

// ── RULES ──
const QS_FIELDS=[{key:"sleep",label:"Sleep Quality",desc:"1=terrible, 5=excellent"},{key:"energy",label:"Energy Level",desc:"1=exhausted, 5=high"},{key:"libido",label:"Libido",desc:"1=absent, 5=strong"},{key:"mood",label:"Mood",desc:"1=flat, 5=driven"},{key:"hydration",label:"Hydration",desc:"1=poor, 5=optimal"},{key:"brain_fog",label:"Brain Fog",desc:"1=clear, 5=severe"},{key:"joint_pain",label:"Joint Pain",desc:"1=none, 5=severe"},{key:"digestion",label:"Digestion",desc:"1=poor, 5=excellent"},{key:"stress",label:"Stress",desc:"1=low, 5=overwhelming"},{key:"exercise",label:"Exercise",desc:"1=none, 5=6+days"}];
const QS_RULES=[
  {check:(a,v)=>a.energy<=2&&v["Vitamin D"]&&v["Vitamin D"].filter(x=>x!=null).slice(-1)[0]<30,sev:"warning",rec:"Low energy + Vitamin D insufficient. Supplement 5-10K IU/day."},
  {check:(a,v)=>a.energy<=2&&v["Free Testosterone"]&&v["Free Testosterone"].filter(x=>x!=null).slice(-1)[0]<15,sev:"warning",rec:"Low energy + Free T low-normal. Optimize protocol."},
  {check:(a,v)=>a.hydration<=2&&v["Hematocrit"]&&v["Hematocrit"].filter(x=>x!=null).slice(-1)[0]>51,sev:"warning",rec:"Poor hydration + elevated hematocrit. Mandate 100+ oz water daily and retest BEFORE further interventions."},
  {check:(a,v)=>a.libido<=2&&v["Free Testosterone"]&&v["Free Testosterone"].filter(x=>x!=null).slice(-1)[0]<15,sev:"warning",rec:"Low libido + Free T low-normal. Primary driver. Optimize."},
  {check:(a,v)=>a.exercise<=1&&v["HDL"]&&v["HDL"].filter(x=>x!=null).slice(-1)[0]<40,sev:"warning",rec:"No exercise + HDL low. Aerobic exercise is #1 for raising HDL. 150+ min/week."},
  {check:(a,v)=>a.digestion<=2&&v["ALT"]&&v["ALT"].filter(x=>x!=null).slice(-1)[0]>40,sev:"info",rec:"Poor digestion + ALT elevated. Liver stress contributing. Audit supplements."},
];
const RULES=[
  {m:"Hematocrit",fn:v=>{const r=v.filter(x=>x!=null).slice(-2);return r.length>=2&&r.every(x=>x>51);},s:"critical",t:"Hematocrit elevated consecutive draws. Therapeutic phlebotomy. Evaluate testosterone dose."},
  {m:"ALT",fn:v=>{const s=v.filter(x=>x!=null);if(s.length<2)return false;return s[s.length-1]>s[s.length-2]&&s[s.length-1]>50;},s:"critical",t:"ALT trending up above reference. Abdominal ultrasound. Audit liver-metabolized supplements."},
  {m:"LDL",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>=160;},s:"critical",t:"LDL high-risk (160+). Dietary intervention. Consider ApoB/Lp(a) testing."},
  {m:"Hemoglobin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>17.7;},s:"warning",t:"Hemoglobin above reference. Correlates with hematocrit."},
  {m:"MCV",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>97;},s:"warning",t:"MCV elevated (macrocytosis). Check B12/folate."},
  {m:"Eosinophils %",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>5;},s:"info",t:"Eosinophils trending up. Consider allergy panel."},
  {m:"HDL",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<40;},s:"warning",t:"HDL below protective threshold. Omega-3, aerobic exercise, niacin."},
  {m:"Triglycerides",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>150;},s:"warning",t:"Triglycerides elevated. Verify fasting. Reduce refined carbs."},
  {m:"Ferritin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>400;},s:"critical",t:"Ferritin above reference. Therapeutic phlebotomy."},
  {m:"Vitamin D",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<30;},s:"warning",t:"Vitamin D insufficient. Supplement 5-10K IU daily."},
  {m:"Free Testosterone",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l<10;},s:"warning",t:"Free T below optimal. Evaluate SHBG and protocol."},
  {m:"Estradiol",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>42.6;},s:"warning",t:"Estradiol elevated. Consider AI adjustment."},
  {m:"IGF-1",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>290;},s:"info",t:"IGF-1 above range. Monitor GH/peptide dose."},
  {m:"Prolactin",fn:v=>{const l=v.filter(x=>x!=null).slice(-1)[0];return l&&l>20;},s:"info",t:"Prolactin upper range. If trending up, pituitary MRI."},
];

// ── HELPERS ──
const st=(v,m)=>{const d=MD[m];if(!d||v==null)return"none";if(v<d.lo)return"low";if(v>d.hi)return"high";return"ok";};
const tr=(vals)=>{const v=vals.filter(x=>x!=null);if(v.length<2)return"flat";const p=((v[v.length-1]-v[v.length-2])/Math.abs(v[v.length-2]||1))*100;return p>5?"up":p<-5?"dn":"flat";};
function runLR(d){const o=[];for(const r of RULES){const mv=d.values[r.m];if(!mv)continue;try{if(r.fn(mv))o.push({marker:r.m,sev:r.s,rec:r.t});}catch(e){}}o.sort((a,b)=>({critical:0,warning:1,info:2}[a.sev])-({critical:0,warning:1,info:2}[b.sev]));return o;}
function runQR(qs,vals){if(!qs?.length)return[];const a=qs[qs.length-1].answers;const o=[];for(const r of QS_RULES){try{if(r.check(a,vals))o.push({sev:r.sev,rec:r.rec});}catch(e){}}return o;}

// ── MARKER CARD ──
function MCard({marker,values,draws,open,toggle}){
  const d=MD[marker];if(!d)return null;
  const vv=values.filter(v=>v!=null);if(!vv.length)return null;
  const last=vv[vv.length-1];const li=values.length-1-[...values].reverse().findIndex(v=>v!=null);
  const s=st(last,marker);const t=tr(values);const col=s==="ok"?"var(--green)":s==="high"?"var(--red)":"var(--amber)";
  return(<div style={{background:"var(--card)",border:"1px solid "+(s==="high"||s==="low"?(s==="high"?SC.critical:SC.warning)+"30":"var(--border)"),borderRadius:14,overflow:"hidden"}}>
    <div onClick={toggle} style={{padding:"15px 20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
        <span style={{display:"inline-block",width:9,height:9,borderRadius:"50%",background:col}}/>
        <span style={{color:"var(--t2)",fontWeight:600,fontSize:14}}>{marker}</span>
        <span style={{color:"var(--t7)",fontSize:11,fontFamily:"var(--mono)"}}>{d.u}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{textAlign:"right"}}>
          <span style={{color:col,fontWeight:700,fontSize:20,fontFamily:"var(--mono)"}}>{last}</span>
          <span style={{color:"var(--t6)",fontSize:10.5,display:"block"}}>{draws[li]?.date}</span>
        </div>
        {t==="up"&&<span style={{color:"var(--red)"}}>&#9650;</span>}
        {t==="dn"&&<span style={{color:"var(--green)"}}>&#9660;</span>}
        <span style={{color:"var(--t6)"}}>{open?"&#9652;":"&#9662;"}</span>
      </div>
    </div>
    {open&&<div style={{padding:"0 20px 20px"}}>
      <SVGChart marker={marker} values={values} draws={draws} def={d}/>
      <div style={{marginTop:14,display:"flex",flexWrap:"wrap",gap:7}}>
        {draws.map((dr,i)=>values[i]!=null&&<div key={i} style={{background:"var(--bg)",borderRadius:7,padding:"5px 10px",fontSize:11,color:"var(--t5)",border:"1px solid var(--border)"}}>
          <span style={{color:"var(--t2)",fontWeight:600}}>{dr.date}</span>{" | "}
          <span style={{color:st(values[i],marker)==="ok"?"var(--green)":st(values[i],marker)==="high"?"var(--red)":"var(--amber)",fontFamily:"var(--mono)",fontWeight:600}}>{values[i]}</span>{" | "}{dr.lab}
        </div>)}
      </div>
    </div>}
  </div>);
}

// ── QUESTIONNAIRE ──
function QS({questionnaire,values,onSave}){
  const[a,sA]=useState({sleep:3,energy:3,libido:3,mood:3,hydration:3,brain_fog:1,joint_pain:1,digestion:3,stress:2,exercise:3});
  const[saved,sS]=useState(false);
  const qr=useMemo(()=>runQR([{answers:a}],values),[a,values]);
  const prev=questionnaire?.length?questionnaire[questionnaire.length-1]:null;
  const neg=k=>k==="brain_fog"||k==="joint_pain"||k==="stress";
  return(<div>
    <div className="qs-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
      {QS_FIELDS.map(f=><div key={f.key} style={{background:"var(--card)",borderRadius:12,padding:"16px 18px",border:"1px solid var(--border)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"var(--t2)",fontWeight:600,fontSize:13}}>{f.label}</span>{prev?.answers?.[f.key]!=null&&<span style={{color:"var(--t7)",fontSize:11}}>Prev: {prev.answers[f.key]}/5</span>}</div>
        <div style={{color:"var(--t6)",fontSize:11,marginBottom:10}}>{f.desc}</div>
        <div style={{display:"flex",gap:6}}>{[1,2,3,4,5].map(n=>{const act=a[f.key]===n;const c=neg(f.key)?(n<=2?"var(--green)":n>=4?"var(--red)":"var(--amber)"):(n<=2?"var(--red)":n>=4?"var(--green)":"var(--amber)");return<button key={n} onClick={()=>sA({...a,[f.key]:n})} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"1px solid "+(act?c+"60":"var(--border)"),background:act?c+"18":"transparent",color:act?c:"var(--t6)",cursor:"pointer",fontSize:12,fontWeight:act?700:400}}>{n}</button>})}</div>
      </div>)}
    </div>
    {qr.length>0&&<div style={{marginBottom:20}}><h4 style={{color:"var(--amber)",fontSize:14,fontWeight:700,marginBottom:12}}>Cross-Reference Findings ({qr.length})</h4>{qr.map((r,i)=><div key={i} style={{background:"var(--card)",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}}><span style={{display:"inline-block",padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",background:SC[r.sev]+"14",color:SC[r.sev],marginBottom:8}}>MONITOR</span><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.7}}>{r.rec}</div></div>)}</div>}
    <button onClick={()=>{onSave(a);sS(true);setTimeout(()=>sS(false),2000);}} style={{background:saved?"var(--green)":"linear-gradient(135deg,var(--green),#2a9d54)",border:"none",borderRadius:10,padding:"13px 28px",color:"var(--bg)",fontWeight:700,fontSize:14,cursor:"pointer"}}>{saved?"Saved!":"Save Questionnaire"}</button>
  </div>);
}

// ── TIMELINE ──
function TL({timeline}){return(<div>{timeline.map((e,i)=><div key={i} style={{display:"flex",gap:16}}>
  <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:20,flexShrink:0}}><div style={{width:12,height:12,borderRadius:"50%",background:i===timeline.length-1?"var(--green)":"var(--border2)",border:"2px solid "+(i===timeline.length-1?"var(--green)":"var(--t7)")}}/>{i<timeline.length-1&&<div style={{width:2,flex:1,background:"var(--border)",marginTop:4,marginBottom:4}}/>}</div>
  <div style={{background:"var(--card)",borderRadius:12,padding:"14px 18px",border:"1px solid var(--border)",marginBottom:14,flex:1}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{color:i===timeline.length-1?"var(--green)":"var(--t2)",fontWeight:700,fontSize:14}}>{e.date}</span>{i===timeline.length-1&&<span style={{padding:"2px 8px",borderRadius:5,fontSize:9,fontWeight:700,background:"var(--green)18",color:"var(--green)"}}>CURRENT</span>}</div><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.8}}>{e.notes}</div></div>
</div>)}</div>);}

// ── PDF UPLOADER ──
function PDFUp({onDone,existing}){
  const[files,setF]=useState([]);const[busy,setB]=useState(false);const[prog,setP]=useState("");const[res,setR]=useState([]);const ref=useRef();
  const go=async()=>{setB(true);const out=[];for(let i=0;i<files.length;i++){setP("Reading "+files[i].name+"...");try{const b64=await new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(",")[1]);r.onerror=()=>no(new Error("Fail"));r.readAsDataURL(files[i]);});const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:"Extract ALL lab values. Match: "+Object.keys(MD).join(", ")+". Aliases: SGPT=ALT,SGOT=AST,GFR=eGFR,25-Hydroxy Vitamin D=Vitamin D,Hemoglobin A1c=HbA1c,Sex Hormone Binding Globulin=SHBG. ONLY JSON:\n{\"draws\":[{\"date\":\"Mar 2026\",\"lab\":\"Labcorp\",\"fasting\":true,\"markers\":{\"Hematocrit\":56.1}}],\"patient_name\":null,\"patient_dob\":null}"}]}]})});const d=await resp.json();const txt=d.content?.map(c=>c.text||"").join("")||"";out.push({file:files[i].name,data:JSON.parse(txt.replace(/```json|```/g,"").trim())});}catch(e){out.push({file:files[i].name,err:e.message});}}setR(out);setB(false);};
  const totM=res.reduce((s,r)=>s+(r.data?.draws||[]).reduce((a,d)=>a+Object.keys(d.markers||{}).length,0),0);
  return(<div style={{background:"var(--card)",borderRadius:14,border:"1px solid var(--border)",padding:24}}>
    <h3 style={{margin:"0 0 6px",color:"var(--t2)",fontSize:16,fontWeight:700}}>Upload Lab PDFs</h3>
    <p style={{color:"var(--t6)",fontSize:13,margin:"0 0 18px"}}>Drop Labcorp/Quest PDFs. AI extracts all markers.</p>
    <div onClick={()=>ref.current?.click()} onDrop={e=>{e.preventDefault();setF(p=>[...p,...Array.from(e.dataTransfer.files).filter(f=>f.type==="application/pdf")]);}} onDragOver={e=>e.preventDefault()} style={{border:"2px dashed var(--border2)",borderRadius:12,padding:"36px 20px",textAlign:"center",cursor:"pointer",background:"var(--bg)"}}><input ref={ref} type="file" accept=".pdf" multiple onChange={e=>setF(p=>[...p,...Array.from(e.target.files||[]).filter(f=>f.type==="application/pdf")])} style={{display:"none"}}/><div style={{color:"var(--t5)",fontSize:14,fontWeight:500}}>Drop PDFs here or click to browse</div></div>
    {files.length>0&&<div style={{marginTop:12}}>{files.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",background:"var(--bg)",borderRadius:9,border:"1px solid var(--border)",marginBottom:6}}><span style={{color:"var(--t4)",flex:1,fontSize:13}}>{f.name}</span>{!busy&&<span onClick={()=>setF(files.filter((_,x)=>x!==i))} style={{cursor:"pointer",color:"var(--t6)"}}>x</span>}</div>)}</div>}
    {files.length>0&&!busy&&!res.length&&<button onClick={go} style={{marginTop:12,background:"linear-gradient(135deg,var(--green),#2a9d54)",border:"none",borderRadius:10,padding:"13px",color:"var(--bg)",fontWeight:700,fontSize:14,cursor:"pointer",width:"100%"}}>Extract from {files.length} PDF{files.length>1?"s":""}</button>}
    {busy&&<div style={{textAlign:"center",padding:"24px 0"}}><div style={{width:24,height:24,border:"3px solid var(--green)",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 10px"}}/><div style={{color:"var(--green)",fontWeight:600}}>{prog}</div></div>}
    {res.length>0&&<div style={{marginTop:16}}><div style={{background:"var(--bg)",borderRadius:12,padding:18,border:"1px solid var(--border)",marginBottom:14}}><div style={{color:"var(--green)",fontWeight:700,marginBottom:10}}>Extraction Complete - {totM} markers</div>{res.map((r,i)=><div key={i}><span style={{color:"var(--t4)",fontWeight:600}}>{r.file}</span>{r.err&&<span style={{color:"var(--red)"}}> - {r.err}</span>}{r.data?.draws?.map((d,di)=><div key={di} style={{marginTop:5,padding:"7px 12px",background:"var(--card)",borderRadius:7,border:"1px solid var(--border)",fontSize:12,color:"var(--t5)"}}>{d.date} | {d.lab} | <span style={{color:"var(--green)"}}>{Object.keys(d.markers||{}).length} markers</span></div>)}</div>)}</div><div style={{display:"flex",gap:12}}><button onClick={()=>{setR([]);setF([]);}} style={{flex:1,background:"var(--border)",border:"none",borderRadius:10,padding:13,color:"var(--t5)",cursor:"pointer"}}>Reset</button><button onClick={()=>onDone(res)} style={{flex:2,background:"linear-gradient(135deg,var(--green),#2a9d54)",border:"none",borderRadius:10,padding:13,color:"var(--bg)",fontWeight:700,cursor:"pointer"}}>Load Into Dashboard</button></div></div>}
  </div>);
}

// ── MAIN APP ──
function App(){
  const[data,setData]=useState(DEMO);
  const[cat,setCat]=useState("all");
  const[exp,setExp]=useState(new Set(["Hematocrit","ALT","Total Testosterone","LDL","Ferritin","HDL"]));
  const[tab,setTab]=useState("dashboard");
  const has=data.draws.length>0;
  const lr=useMemo(()=>has?runLR(data):[],[data,has]);
  const qr=useMemo(()=>runQR(data.questionnaire,data.values),[data]);
  const all=[...lr,...qr];const crit=all.filter(r=>r.sev==="critical").length;const warn=all.filter(r=>r.sev==="warning").length;
  const toggle=m=>{const n=new Set(exp);if(n.has(m))n.delete(m);else n.add(m);setExp(n);};
  const cats=useMemo(()=>{const o={};for(const[m,v]of Object.entries(data.values)){const d=MD[m];if(!d)continue;if(!o[d.c])o[d.c]=[];if(v.some(x=>x!=null))o[d.c].push(m);}return o;},[data]);
  const fc=cat==="all"?cats:{[cat]:cats[cat]||[]};
  const wins=useMemo(()=>{let c=0;for(const[m,v]of Object.entries(data.values)){const vl=v.filter(x=>x!=null);if(vl.length<2)continue;const d=MD[m];if(!d)continue;const prev=vl[vl.length-2],last=vl[vl.length-1];if(st(prev,m)!=="ok"&&st(last,m)==="ok")c++;else if(st(prev,m)==="high"&&last<prev&&d.hi<999)c++;}return c;},[data]);
  const merge=(res)=>{const ed=[...data.draws];const ev={...data.values};for(const r of res){if(!r.data?.draws)continue;for(const draw of r.data.draws){const ei=ed.findIndex(d=>d.date===draw.date);if(ei>=0){for(const[mk,val]of Object.entries(draw.markers||{})){if(!ev[mk])ev[mk]=new Array(ed.length).fill(null);while(ev[mk].length<ed.length)ev[mk].push(null);ev[mk][ei]=val;}}else{ed.push({date:draw.date,lab:draw.lab,fasting:draw.fasting??true});for(const mk of Object.keys(ev))ev[mk].push(null);const ni=ed.length-1;for(const[mk,val]of Object.entries(draw.markers||{})){if(!ev[mk])ev[mk]=new Array(ed.length).fill(null);while(ev[mk].length<ed.length)ev[mk].push(null);ev[mk][ni]=val;}}}}setData({...data,draws:ed,values:ev});setTab("dashboard");};
  const handleQS=answers=>{setData({...data,questionnaire:[...(data.questionnaire||[]),{date:data.draws[data.draws.length-1]?.date||"Current",answers}]});};
  const tabs=[{k:"dashboard",l:"Dashboard"},{k:"recommendations",l:"Recs ("+all.length+")"},{k:"questionnaire",l:"Questionnaire"},{k:"timeline",l:"History"},{k:"summary",l:"Summary"},{k:"upload",l:"Upload"}];

  return(<div style={{fontFamily:"var(--font)",background:"var(--bg)",minHeight:"100vh",color:"var(--t3)"}}>
    <div style={{background:"linear-gradient(180deg,#0c1220,var(--card))",borderBottom:"1px solid var(--border)",padding:"18px 24px"}}>
      <div className="hdr-wrap" style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,var(--green),var(--cyan))",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:"var(--bg)",fontFamily:"Outfit"}}>M</div><div><h1 style={{margin:0,fontSize:19,fontWeight:800,color:"var(--t1)",fontFamily:"var(--head)"}}>MedLabIQ</h1><div style={{fontSize:11,color:"var(--t7)"}}>Clinical Lab Intelligence</div></div></div>
        <div className="hdr-right" style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {has&&<div style={{background:"var(--amber)15",border:"1px solid var(--amber)30",borderRadius:8,padding:"6px 14px",fontSize:12,color:"var(--amber)",fontWeight:600}}>DEMO</div>}
          {has&&<div style={{background:"var(--card)",borderRadius:9,padding:"8px 14px",border:"1px solid var(--border)",fontSize:13}}><span style={{color:"var(--t6)"}}>Patient: </span><span style={{color:"var(--t2)",fontWeight:600}}>{data.patient.name}</span>{" | "}{data.draws.length} draws</div>}
        </div>
      </div>
    </div>
    <div className="page-pad" style={{maxWidth:1280,margin:"0 auto",padding:24}}>
      {has&&tab!=="upload"&&<div className="stat-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12,marginBottom:26}}>
        {[{l:"Action Items",v:crit,c:crit>0?"var(--red)":"var(--green)",s:"critical"},{l:"Monitor",v:warn,c:warn>0?"var(--amber)":"var(--green)",s:"warnings"},{l:"Improving",v:wins,c:"var(--green)",s:"trending better"},{l:"Tracked",v:Object.values(data.values).filter(v=>v.some(x=>x!=null)).length,c:"var(--purple)",s:"markers"}].map((x,i)=><div key={i} style={{background:"var(--card)",borderRadius:14,padding:"18px 22px",border:"1px solid var(--border)"}}><div style={{color:"var(--t6)",fontSize:10.5,textTransform:"uppercase",fontWeight:700,letterSpacing:"0.08em"}}>{x.l}</div><div className="sn" style={{fontSize:34,fontWeight:800,color:x.c,fontFamily:"var(--mono)",marginTop:5}}>{x.v}</div><div style={{fontSize:12,color:"var(--t7)"}}>{x.s}</div></div>)}
      </div>}
      {has&&<div className="tab-nav" style={{display:"flex",gap:3,marginBottom:26,background:"var(--card)",borderRadius:12,padding:4,border:"1px solid var(--border)",flexWrap:"wrap"}}>{tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{flex:"1 1 auto",padding:"11px 14px",border:"none",borderRadius:9,background:tab===t.k?"var(--border)":"transparent",color:tab===t.k?"var(--t2)":"var(--t6)",cursor:"pointer",fontSize:12.5,fontWeight:tab===t.k?600:400,whiteSpace:"nowrap"}}>{t.l}</button>)}</div>}

      {(tab==="upload"||!has)&&<div><PDFUp onDone={merge} existing={data.draws.map(d=>d.date)}/>{has&&<div style={{textAlign:"center",marginTop:18}}><button onClick={()=>setTab("dashboard")} style={{background:"var(--purple)",border:"none",borderRadius:10,padding:"13px 36px",color:"#fff",fontWeight:700,cursor:"pointer"}}>Back to Dashboard</button></div>}</div>}

      {has&&tab==="dashboard"&&<div>
        <div className="cat-filter" style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:22}}><button onClick={()=>setCat("all")} style={{background:cat==="all"?"var(--border)":"var(--card)",border:"1px solid "+(cat==="all"?"var(--border2)":"var(--border)"),borderRadius:9,padding:"7px 16px",fontSize:12,color:cat==="all"?"var(--t2)":"var(--t6)",cursor:"pointer"}}>All</button>{Object.entries(CC).map(([k,cfg])=>{if(!cats[k])return null;return<button key={k} onClick={()=>setCat(k)} style={{background:cat===k?cfg.color+"12":"var(--card)",border:"1px solid "+(cat===k?cfg.color+"35":"var(--border)"),borderRadius:9,padding:"7px 16px",fontSize:12,color:cat===k?cfg.color:"var(--t6)",cursor:"pointer"}}>{cfg.label}</button>;})}</div>
        {Object.entries(fc).map(([ct,markers])=>{if(!markers?.length)return null;const cfg=CC[ct];return<div key={ct} style={{marginBottom:30}}><div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14,paddingBottom:10,borderBottom:"1px solid "+(cfg?.color||"#253040")+"18"}}><span style={{color:cfg?.color,fontSize:16,fontWeight:700,fontFamily:"var(--head)"}}>{cfg?.label||ct}</span><span style={{color:"var(--t8)",fontSize:12}}>({markers.length})</span></div><div style={{display:"flex",flexDirection:"column",gap:9}}>{markers.map(m=><MCard key={m} marker={m} values={data.values[m]} draws={data.draws} open={exp.has(m)} toggle={()=>toggle(m)}/>)}</div></div>;})}
      </div>}

      {has&&tab==="recommendations"&&<div>
        <div style={{marginBottom:18,color:"var(--t5)",fontSize:13}}>Auto-generated from labs{qr.length>0?" and questionnaire":""}. {crit>0&&<span style={{color:"var(--red)",fontWeight:600}}>{crit} critical.</span>}</div>
        {lr.map((r,i)=><div key={i} style={{background:"var(--card)",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",background:SC[r.sev]+"14",color:SC[r.sev]}}>{r.sev==="critical"?"ACTION REQUIRED":r.sev==="warning"?"MONITOR":"NOTE"}</span><span style={{color:"var(--t2)",fontWeight:600}}>{r.marker}</span></div><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.7}}>{r.rec}</div></div>)}
        {qr.length>0&&<div style={{marginTop:20}}><h4 style={{color:"var(--amber)",fontWeight:700,marginBottom:12}}>Questionnaire Cross-Ref</h4>{qr.map((r,i)=><div key={"q"+i} style={{background:"var(--card)",borderLeft:"4px solid "+SC[r.sev],borderRadius:"0 12px 12px 0",padding:"14px 18px",marginBottom:10}}><span style={{display:"inline-block",padding:"2px 10px",borderRadius:5,fontSize:9.5,fontWeight:700,background:SC[r.sev]+"14",color:SC[r.sev],marginBottom:8}}>MONITOR</span><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.7}}>{r.rec}</div></div>)}</div>}
        {all.length===0&&<div style={{padding:32,textAlign:"center",color:"var(--t6)"}}><div style={{fontSize:36,color:"var(--green)",marginBottom:8}}>&#10003;</div>All clear.</div>}
      </div>}

      {has&&tab==="questionnaire"&&<div><div style={{marginBottom:18,color:"var(--t5)",fontSize:13}}>Patient symptoms cross-referenced with labs.</div><QS questionnaire={data.questionnaire} values={data.values} onSave={handleQS}/></div>}
      {has&&tab==="timeline"&&<div><div style={{marginBottom:18,color:"var(--t5)",fontSize:13}}>Chronological patient history.</div><TL timeline={data.timeline}/></div>}

      {has&&tab==="summary"&&<div style={{background:"var(--card)",borderRadius:14,padding:30,border:"1px solid var(--border)"}}>
        <h2 style={{margin:"0 0 5px",color:"var(--t1)",fontSize:21,fontWeight:800,fontFamily:"var(--head)"}}>Lab Review Summary</h2>
        <div style={{color:"var(--t6)",fontSize:13,marginBottom:26}}>Patient: {data.patient.name} | {data.draws.length} draws ({data.draws[0]?.date} - {data.draws[data.draws.length-1]?.date})</div>
        <div style={{marginBottom:28}}><h3 style={{color:"var(--green)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>&#10003; What's Working</h3><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>{Object.entries(data.values).map(([m,v])=>{const vl=v.filter(x=>x!=null);if(vl.length<2)return null;const d=MD[m];if(!d)return null;const first=vl[0],last=vl[vl.length-1];if((st(first,m)!=="ok"&&st(last,m)==="ok")||(st(first,m)==="high"&&last<first&&d.hi<999)){const pct=((last-first)/Math.abs(first)*100).toFixed(0);return<div key={m}>&#10003; <strong>{m}</strong>: {first} &#8594; {last} {d.u} ({pct>0?"+":""}{pct}%)</div>;}return null;}).filter(Boolean)}</div></div>
        <div style={{marginBottom:28}}><h3 style={{color:"var(--red)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>&#9888; Action Items</h3>{all.length>0?<div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>{all.map((r,i)=><div key={i} style={{marginBottom:10,paddingLeft:18,borderLeft:"3px solid "+SC[r.sev]}}><strong style={{color:SC[r.sev]}}>{i+1}. {r.marker||"Questionnaire"}</strong>: {r.rec}</div>)}</div>:<div style={{color:"var(--green)"}}>All clear.</div>}</div>
        <div style={{marginBottom:24}}><h3 style={{color:"var(--amber)",fontSize:15,fontWeight:700,margin:"0 0 14px"}}>Re-Add to Next Panel</h3><div style={{color:"var(--t4)",fontSize:13,lineHeight:1.9}}>{Object.entries(data.values).map(([m,v])=>{if(v.length<2)return null;if(v.slice(-2).every(x=>x==null)&&v.some(x=>x!=null)){const li=v.length-1-[...v].reverse().findIndex(x=>x!=null);return<div key={m}>&#8226; <strong>{m}</strong> (last: {data.draws[li]?.date})</div>;}return null;}).filter(Boolean)}</div></div>
        {!data.draws[data.draws.length-1]?.fasting&&<div style={{padding:"12px 18px",background:"var(--amber)0e",borderRadius:10,border:"1px solid var(--amber)25",color:"var(--amber)",fontSize:13,marginBottom:20}}><strong>Note:</strong> Last draw was non-fasting. Next lipid panel should be fasting.</div>}
        <div style={{padding:"14px 18px",background:"var(--bg)",borderRadius:10,color:"var(--t7)",fontSize:11,lineHeight:1.7}}>Auto-generated. Not medical advice. Powered by MedLabIQ.</div>
      </div>}
    </div>
  </div>);
}
ReactDOM.render(<App/>, document.getElementById('root'));
</script></body></html>
